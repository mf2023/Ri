# DMSC C API Header Generation Configuration
#
# This configuration file is used by cbindgen to automatically generate
# C header files from Rust source code. The generated headers provide
# C language bindings for DMSC's functionality.
#
# Usage:
#   cbindgen --crate dmsc -o include/dmsc.h
#
# For more information on cbindgen configuration options, see:
# https://github.com/mozilla/cbindgen/blob/master/docs.md

[parse]
# Parse dependencies for types
parse_deps = false

# Include non-public items (needed for internal types exposed via C API)
include = []

[export]
# The name of the header file to generate
include_version = true

# Prefix for all generated symbols to avoid naming conflicts
prefix = "CDMSC"

# Rename types to follow C naming conventions
renames = { "DMSCAppBuilder" = "CDMSCAppBuilder", "DMSCConfig" = "CDMSCConfig" }

[fn]
# Sort functions by name for better readability
sort_by = "Name"

# Add documentation comments to generated functions
rename_args = "GeckoCase"

[struct]
# Generate associated constants in structs
associated_constants_in_body = true

# Derive constructors for structs
derive_constructor = true

# Derive destructors for structs
derive_destructor = true

[enum]
# Add prefix to enum variants
prefix_with_name = true

# Use C-style enum declarations
derive_helper_methods = true

[macro_expansion]
# Enable macro expansion for better type resolution
bitflags = true

[language]
# Generate C header (not C++)
header = """/*
 * Copyright © 2025-2026 Wenze Wei. All Rights Reserved.
 *
 * This file is part of DMSC.
 * The DMSC project belongs to the Dunimd Team.
 *
 * Licensed under the Apache License, Version 2.0 (the "License");
 * you may not use this file except in compliance with the License.
 * You may obtain a copy of the License at
 *
 *     http://www.apache.org/licenses/LICENSE-2.0
 *
 * Unless required by applicable law or agreed to in writing, software
 * distributed under the License is distributed on an "AS IS" BASIS,
 * WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
 * See the License for the specific language governing permissions and
 * limitations under the License.
 */

/*
 * DMSC C API Header - Auto-generated by cbindgen
 *
 * This header provides C language bindings for the DMSC middleware framework.
 * DMSC is a high-performance Rust middleware framework with modular architecture,
 * built-in observability, and distributed systems support.
 *
 * For full documentation, see: https://mf2023.github.io/DMSC/dmsc/
 */
"""

# Include guards
include_guard = "DMSC_H"

# Autogen warning
autogen_warning = "/* Warning: This file is auto-generated by cbindgen. Do not modify manually. */"

# Include standard C headers
sys_includes = ["stdint.h", "stddef.h", "stdbool.h"]

# C standard version
cpp_compat = true

[style]
# Use 4-space indentation
indent = "    "

# Line length limit
line_length = 100

# Braces style
braces = "SameLine"
