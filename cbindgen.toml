# Include guards
include_guard = "RI_H"

# Autogen warning
autogen_warning = "/* Warning: This file is auto-generated by cbindgen. Do not modify manually. */"

# Include standard C headers
sys_includes = ["stdint.h", "stddef.h", "stdbool.h", "stdio.h"]

# C standard version
