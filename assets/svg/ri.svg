  ============================================================================
  Ri Logo SVG
  ============================================================================
  This is the official logo for Ri (Ri).

  Design Specifications:
  - Canvas Size: 512x512 pixels
  - Corner Radius: 115 pixels (22.5% of width)
  - Primary Color: #1E6CFF (Blue)
  - Font: Inter, sans-serif
  - Font Size: 130 pixels
  - Font Weight: 900 (Black)
  - Letter Spacing: -2 pixels

  Usage:
  - This SVG serves as the source file for all Ri branding materials
  - Export to PNG at various sizes (16x16, 32x32, 48x48, 128x128, etc.)
  - Do not modify without authorization

  ============================================================================
-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect x="0" y="0" width="512" height="512" rx="115" fill="#1E6CFF"/>
  <text x="256" y="301"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="130"
        font-weight="900"
        fill="white"
        text-anchor="middle"
        letter-spacing="-2">Ri</text>
</svg>