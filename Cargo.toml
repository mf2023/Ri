[package]
name = "dms_core"
version = "0.1.2"
edition = "2021"
authors = ["Dunimd Team"]
description = "Dunimd Middleware Service - A high-performance Rust middleware framework with modular architecture"
repository = "https://gitee.com/dunimd/dms"
readme = "README.md"
keywords = ["middleware", "framework", "distributed", "async", "microservices"]
categories = ["asynchronous", "web-programming", "network-programming"]
license = "Apache-2.0"

[lib]
name = "dms_core"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"]

[dependencies]
pyo3 = { version = "0.27", features = ["extension-module"] }

# DMS core dependencies
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
rand = "0.8"
notify = "6.1"
chrono = { version = "0.4", features = ["serde", "std"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
prometheus = "0.13"
dashmap = "5.5"
redis = { version = "0.24", features = ["tokio-comp", "connection-manager"] }
hyper = { version = "0.14", features = ["full"] }
lapin = { version = "2.3", features = ["rustls"], optional = true }
futures = "0.3"
yaml-rust = "0.4"
toml = "0.8"
sysinfo = "0.29"
jsonwebtoken = "8"
reqwest = { version = "0.11", features = ["json"] }
urlencoding = "2"
parking_lot = "0.12"
log = "0.4"
# Kafka support disabled due to Windows build issues
# rdkafka = { version = "0.36", default-features = false, features = ["tokio", "libz"] }

# Optional dependencies
etcd-client = { version = "0.11", features = ["tls"], optional = true }
rdkafka = { version = "0.36", default-features = false, features = ["tokio", "libz"], optional = true }

[features]
default = ["pyo3"]
etcd = ["dep:etcd-client"]
pyo3 = []
kafka = ["rdkafka"]
rabbitmq = ["dep:lapin"]

[dev-dependencies]
tempfile = "3"
