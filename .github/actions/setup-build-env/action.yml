name: 'Setup Build Environment'
description: 'Install common build dependencies for Ri compilation'
author: 'Dunimd Team'

inputs:
  platform:
    description: 'Target platform (windows/linux/macos)'
    required: true
  arch:
    description: 'Target architecture (x64/arm64)'
    required: true
  install-openSSL:
    description: 'Whether to install OpenSSL (Windows only)'
    required: false
    default: 'true'
  rust-toolchain:
    description: 'Rust toolchain to install'
    required: false
    default: 'stable'
  rust-target:
    description: 'Rust target triple (e.g., x86_64-pc-windows-msvc)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install protoc
      uses: arduino/setup-protoc@v3
      with:
        version: '33.x'
        repo-token: ${{ github.token }}

    - name: Install CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.28.x'

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-toolchain }}
        targets: ${{ inputs.rust-target }}

    - name: Setup MSVC (Windows)
      if: inputs.platform == 'windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install OpenSSL (Windows x64)
      if: inputs.platform == 'windows' && inputs.arch == 'x64' && inputs.install-openSSL == 'true'
      shell: pwsh
      run: |
        vcpkg install openssl:x64-windows
        vcpkg integrate install
        $vcpkgRoot = "C:\vcpkg"
        $opensslRoot = "$vcpkgRoot\installed\x64-windows"
        echo "OPENSSL_ROOT_DIR=$opensslRoot" >> $env:GITHUB_ENV
        echo "OPENSSL_INCLUDE_DIR=$opensslRoot\include" >> $env:GITHUB_ENV
        echo "OPENSSL_LIB_DIR=$opensslRoot\lib" >> $env:GITHUB_ENV
        echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV
        echo "CMAKE_TOOLCHAIN_FILE=$vcpkgRoot\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV

    - name: Install OpenSSL (Windows ARM64)
      if: inputs.platform == 'windows' && inputs.arch == 'arm64' && inputs.install-openSSL == 'true'
      shell: pwsh
      run: |
        vcpkg install openssl:arm64-windows
        vcpkg integrate install
        $vcpkgRoot = "C:\vcpkg"
        $opensslRoot = "$vcpkgRoot\installed\arm64-windows"
        echo "OPENSSL_ROOT_DIR=$opensslRoot" >> $env:GITHUB_ENV
        echo "OPENSSL_INCLUDE_DIR=$opensslRoot\include" >> $env:GITHUB_ENV
        echo "OPENSSL_LIB_DIR=$opensslRoot\lib" >> $env:GITHUB_ENV
        echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV
        echo "CMAKE_TOOLCHAIN_FILE=$vcpkgRoot\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV

    - name: Install system dependencies (Linux)
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

    - name: Install dependencies (macOS)
      if: inputs.platform == 'macos'
      shell: bash
      run: |
        brew update --quiet 2>/dev/null || true
        brew install --quiet cmake pkg-config openssl 2>/dev/null || true

    - name: Configure macOS linker for PyO3
      if: inputs.platform == 'macos'
      shell: bash
      run: |
        mkdir -p .cargo
        cat > .cargo/config.toml << 'EOF'
        [target.x86_64-apple-darwin]
        rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

        [target.aarch64-apple-darwin]
        rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]
        EOF
