# =============================================================================
# Workflow: Build and Publish DMSC
# =============================================================================
# Purpose: Build on every push, publish and sync release only on GitHub Release
#
# Trigger Rules:
# 1. Every push to main/master - builds only (CI check)
# 2. GitHub Release published - builds, publishes, and syncs to Gitee
#
# Release Types:
# - Title contains "Test": Publish to TestPyPI only
# - Title without "Test": Publish to PyPI + crates.io
#
# Required Secrets:
# - CARGO_REGISTRY_TOKEN: API token for crates.io
# - PYPI_API_TOKEN: API token for PyPI (production)
# - PYPI_TEST_API_TOKEN: API token for TestPyPI (testing)
# - GITEE_TOKEN: Gitee API token for release sync
# =============================================================================

name: Build and Publish DMSC

# =============================================================================
# Trigger Configuration
# =============================================================================
on:
  # Trigger 1: Every push to main/master branch - builds only
  push:
    branches: [main, master]
  # Trigger 2: GitHub Release published - builds, publishes, and syncs
  release:
    types: [published]

# =============================================================================
# Jobs Definition
# =============================================================================
jobs:

  # ===========================================================================
  # Job 1: Determine Build Context
  # ===========================================================================
  # Analyzes the trigger event to determine what actions to take:
  # - build_only: true if just building for CI (push to branch)
  # - is_release: true if triggered by GitHub Release
  # - is_test_release: true if Release title contains "Test"
  # - should_publish: true if should publish to PyPI/crates.io
  # ===========================================================================
  determine-context:
    runs-on: ubuntu-latest
    outputs:
      build_only: ${{ steps.context.outputs.build_only }}
      is_release: ${{ steps.context.outputs.is_release }}
      is_test_release: ${{ steps.context.outputs.is_test_release }}
      should_publish: ${{ steps.context.outputs.should_publish }}
      release_tag: ${{ steps.context.outputs.release_tag }}
      release_name: ${{ steps.context.outputs.release_name }}
      release_body: ${{ steps.context.outputs.release_body }}
    steps:
      - name: Determine build context
        id: context
        run: |
          EVENT_NAME="${{ github.event_name }}"
          RELEASE_NAME="${{ github.event.release.name }}"
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          RELEASE_BODY="${{ github.event.release.body }}"

          # Default: just build, don't publish
          BUILD_ONLY="true"
          IS_RELEASE="false"
          IS_TEST_RELEASE="false"
          SHOULD_PUBLISH="false"

          if [[ "$EVENT_NAME" == "release" ]]; then
            # GitHub Release triggered
            BUILD_ONLY="false"
            IS_RELEASE="true"
            SHOULD_PUBLISH="true"
            if echo "$RELEASE_NAME" | grep -qi "test"; then
              IS_TEST_RELEASE="true"
              echo "Test release detected - will publish to TestPyPI only"
            else
              echo "Production release detected - will publish to crates.io and PyPI"
            fi
          else
            # Regular push to branch
            echo "Branch push detected - build only, no publish"
          fi

          echo "build_only=$BUILD_ONLY" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "is_test_release=$IS_TEST_RELEASE" >> $GITHUB_OUTPUT
          echo "should_publish=$SHOULD_PUBLISH" >> $GITHUB_OUTPUT
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          # Escape newlines for GitHub Actions output
          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ===========================================================================
  # Job 2: Build and Test Rust Code
  # ===========================================================================
  # Builds the Rust library on multiple platforms to ensure code compiles
  # This job runs on EVERY push (for CI verification)
  # Tests 4 platforms: Linux x64, Linux ARM64, Windows x64, macOS x64
  # ===========================================================================
  build-rust:
    needs: determine-context
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-15
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-check-${{ matrix.target }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            rust-check-${{ matrix.target }}-
            rust-check-

      - name: Build Rust code
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run Rust tests
        run: cargo test --target ${{ matrix.target }}

  # ===========================================================================
  # Job 3: Build Python Wheels for All Platforms
  # ===========================================================================
  # Builds Python wheels for multiple platforms and Python versions
  # This job runs on EVERY push (for CI verification)
  # ===========================================================================
  build-wheels:
    needs: determine-context
    runs-on: ${{ matrix.runs-on }}
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
      CARGO_HTTP_TIMEOUT: '60'
      CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64
          - python: '3.8'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.9'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.10'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.11'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.12'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.13'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.14'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          # Linux ARM64
          - python: '3.8'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.9'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.10'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.11'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.12'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.13'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.14'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          # Windows x64
          - python: '3.8'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.9'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.10'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.11'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.12'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.13'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.14'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          # macOS x64
          - python: '3.8'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.9'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.10'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.11'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.12'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.13'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.14'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          # macOS ARM64
          - python: '3.8'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.9'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.10'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.11'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.12'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.13'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.14'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Configure macOS linker
        if: matrix.target == 'x86_64-apple-darwin' || matrix.target == 'aarch64-apple-darwin'
        run: |
          mkdir -p .cargo
          echo '[target.x86_64-apple-darwin]' > .cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> .cargo/config.toml
          echo '' >> .cargo/config.toml
          echo '[target.aarch64-apple-darwin]' >> .cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> .cargo/config.toml

      - name: Install protoc for macOS
        if: runner.os == 'macOS'
        run: |
          brew install protobuf
          echo "PROTOC=$(brew --prefix protobuf)/bin/protoc" >> $GITHUB_ENV

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/Library/Caches/pip
            ~\AppData\Local\pip\Cache
          key: pip-${{ matrix.python }}-${{ matrix.target }}-${{ hashFiles('**/pyproject.toml', '**/Cargo.toml') }}
          restore-keys: |
            pip-${{ matrix.python }}-${{ matrix.target }}-
            pip-${{ matrix.python }}-

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ matrix.target }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            rust-${{ matrix.target }}-
            rust-

      - name: Install protoc
        if: runner.os == 'Windows' || runner.os == 'Linux'
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install rdkafka dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Configure OpenSSL static linking
        if: runner.os == 'Linux'
        run: |
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
          echo "VENDORED_OPENSSL_SSL=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "cargo:rustflags=-C target-feature=+crt-static" >> $GITHUB_ENV
          if [[ "${{ matrix.target }}" == "aarch64"* ]]; then
            echo "OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu" >> $GITHUB_ENV
          else
            echo "OPENSSL_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          fi
          echo "OPENSSL_INCLUDE_DIR=/usr/include/openssl" >> $GITHUB_ENV

      - name: Configure static linking
        if: runner.os == 'Linux'
        run: |
          mkdir -p .cargo
          printf '[profile.release]\n' > .cargo/config.toml
          printf 'lto = true\ncodegen-units = 1\nstrip = true\n' >> .cargo/config.toml

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Install dependencies
        run: pip install maturin auditwheel --quiet

      - name: Build wheel (non-Docker)
        if: matrix.docker != true
        run: |
          maturin build --release --target ${{ matrix.target }} -o dist

      - name: Build Linux wheel with auditwheel repair
        if: matrix.docker == true
        run: |
          TARGET="${{ matrix.target }}"
          ARCH="${TARGET%%-*}"
          maturin build --release --target "$TARGET" -o wheelhouse
          auditwheel repair wheelhouse/*.whl -w dist --plat ${{ matrix.manylinux }}_${ARCH}

      - name: List generated files
        shell: bash
        run: |
          ls -la dist/ 2>/dev/null || echo "No files in dist"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.target }}-${{ matrix.python }}
          path: dist/

  # ===========================================================================
  # Job 4: Publish to crates.io (Production Only)
  # ===========================================================================
  # Only runs when GitHub Release title does NOT contain "Test"
  # ===========================================================================
  publish-crate:
    needs: [determine-context, build-rust, build-wheels]
    if: needs.determine-context.outputs.should_publish == 'true' && needs.determine-context.outputs.is_test_release == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ===========================================================================
  # Job 5: Publish to PyPI (Production Only)
  # ===========================================================================
  # Only runs when GitHub Release title does NOT contain "Test"
  # ===========================================================================
  publish-pypi:
    needs: [determine-context, build-rust, build-wheels]
    if: needs.determine-context.outputs.should_publish == 'true' && needs.determine-context.outputs.is_test_release == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: python-*
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install twine
        run: pip install twine

      - name: Publish to PyPI
        run: |
          twine upload dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  # ===========================================================================
  # Job 6: Publish to TestPyPI (Test Releases Only)
  # ===========================================================================
  # Only runs when GitHub Release title contains "Test"
  # ===========================================================================
  publish-testpypi:
    needs: [determine-context, build-rust, build-wheels]
    if: needs.determine-context.outputs.is_test_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: python-*
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install twine
        run: pip install twine

      - name: Publish to TestPyPI
        run: |
          twine upload --repository-url https://test.pypi.org/legacy/ dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TEST_API_TOKEN }}

  # ===========================================================================
  # Job 7: Sync Release to Gitee
  # ===========================================================================
  # Creates the same release on Gitee with title, description, and tag
  # Runs for both test and production releases
  # ===========================================================================
  sync-to-gitee:
    needs: [determine-context, build-rust, build-wheels]
    if: needs.determine-context.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Sync Release to Gitee
        run: |
          RELEASE_TAG="${{ needs.determine-context.outputs.release_tag }}"
          RELEASE_NAME="${{ needs.determine-context.outputs.release_name }}"
          RELEASE_BODY="${{ needs.determine-context.outputs.release_body }}"
          
          # Gitee API endpoint
          GITEE_API="https://gitee.com/api/v5/repos/dunimd/dmsc/releases"
          
          # Create release on Gitee
          curl -X POST "$GITEE_API" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${{ secrets.GITEE_TOKEN }}\",
              \"tag_name\": \"$RELEASE_TAG\",
              \"name\": \"$RELEASE_NAME\",
              \"body\": \"$RELEASE_BODY\",
              \"prerelease\": false,
              \"target_commitish\": \"master\"
            }"
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
