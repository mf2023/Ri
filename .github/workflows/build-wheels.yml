################################################################################
# DMSC Rust Library and Python Wheel Build Pipeline
################################################################################
#
# Purpose:
# This GitHub Actions workflow builds the DMSC Rust library and generates
# distributable Python wheel packages (.whl files) for multiple platforms,
# architectures, and Python versions. The workflow ensures binary compatibility
# across the supported target environments.
#
# Architecture Overview:
# 1. Rust Library Compilation Phase: Four dedicated jobs compile the Rust library
#    (libdmsc) as a C dynamic library (cdylib) for each target platform:
#    - Linux x64 (x86_64-unknown-linux-gnu)
#    - Linux arm64 (aarch64-unknown-linux-gnu)
#    - Windows x64 (x86_64-pc-windows-msvc)
#    - macOS x64 (x86_64-apple-darwin)
#
# 2. Python Wheel Generation Phase: A single matrix job generates Python wheels
#    for all supported platform/architecture/Python version combinations.
#    Each matrix entry builds a complete Python wheel with embedded Rust binary.
#
# Build Strategy:
# - Native compilation on matching architecture runners (no cross-compilation)
# - Linux ARM64 uses ubuntu-24.04-arm for proper ARM64 native builds
# - macOS x64 uses macos-15-intel (available until Aug 2027) for Intel builds
# - Docker-based manylinux images for Linux wheel compatibility guarantees
# - maturin as the build tool (Rust/Python integration framework)
#
# Supported Platforms:
# - Linux: x64 and arm64 architectures
# - Windows: x64 architecture
# - macOS: x64 and arm64 (Apple Silicon) architectures
#
# Supported Python Versions: 3.8, 3.9, 3.10, 3.11, 3.12, 3.13, 3.14
#
# Trigger Conditions:
# - Automatic: On push to master branch
# - Manual: Workflow dispatch allows manual execution
#
# Artifacts:
# - Rust library artifacts (.so, .dll, .dylib files) per platform
# - Python wheel artifacts (.whl files) per matrix combination
# - Artifacts are uploaded using actions/upload-artifact@v4
################################################################################

# Workflow name displayed in GitHub Actions UI
name: Build and Publish DMSC (Rust/C/Python)

# =============================================================================
# Trigger Configuration
# =============================================================================
# Defines when this workflow should be executed

on:
  # Trigger 1: On push events to the master branch
  # This ensures wheels are built automatically when code is merged to master
  push:
    branches:
      - master
  
  # Trigger 2: When a GitHub Release is published
  # This triggers the full release pipeline including publishing to PyPI/TestPyPI
  release:
    types: [published]
  
  # Allow manual triggering from the GitHub Actions UI
  # Useful for testing builds or re-running failed jobs
  workflow_dispatch:

# =============================================================================
# Job Definitions
# =============================================================================
# Each job runs in a separate runner environment and can execute in parallel

jobs:
  ################################################################################
  # Job: Build Rust Library for Linux x64
  ################################################################################
  # This job compiles the Rust library as a cdylib (C dynamic library) for Linux x64 architecture
  # The compiled artifact is uploaded for use in subsequent Python wheel building jobs
  # Uses native compilation since the ubuntu-latest runner matches the target platform
  build-rust-linux:
    # Use Ubuntu latest runner for Linux x64 builds
    # This provides a native x86_64 environment for compilation
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository source code
      # Clones the repository to access Cargo.toml and Rust source files
      - uses: actions/checkout@v4

      # Step 2: Install protoc (Protocol Buffers compiler) for etcd-client build
      # The etcd-client crate requires protoc to compile Protocol Buffer definitions
      # This is needed because DMSC includes etcd integration for service discovery
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Install CMake for rdkafka build
      # rdkafka (Kafka client library) requires CMake to build its C dependencies
      # DMSC uses Kafka for message streaming capabilities
      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      # Step 4: Install system dependencies for rdkafka
      # rdkafka requires curl and SASL libraries for network and authentication support
      # These are system-level dependencies needed by the Kafka C client library
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      # Step 5: Build Rust library in release mode
      # Compiles libdmsc as a cdylib for x86_64-unknown-linux-gnu target
      # Release mode enables optimizations (-O3) and LTO for maximum performance
      # Output location: target/release/libdmsc.so
      - name: Build
        run: cargo build --release
      
      # Step 6: Upload compiled library artifact
      # Artifact is named rust-linux-x64 for identification in downloads
      # Contains .so files (libdmsc.so) for Python wheel building on Linux x64
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-linux-x64
          path: target/release/libdmsc.*

  ################################################################################
  # Job: Build Rust Library for Linux ARM64
  ################################################################################
  # NOTE: Switching from cross-compilation to native build on ARM64 Ubuntu runner
  # Cross-compilation from x64 to ARM64 fails because:
  # 1. ring crate requires native compilation for cryptographic operations
  # 2. PyO3 linking issues with cross-compiled artifacts
  # Using ubuntu-24.04-arm provides native ARM64 environment for proper compilation
  build-rust-linux-arm64:
    # Use ARM64-specific Ubuntu runner for native ARM64 compilation
    # This avoids cross-compilation issues with cryptographic and Python bindings
    runs-on: ubuntu-24.04-arm
    steps:
      # Step 1: Checkout repository source code
      # Clones repository for ARM64 native compilation environment
      - uses: actions/checkout@v4
      
      # Step 2: Install protoc (Protocol Buffers compiler) for etcd-client build
      # Required for compiling Protocol Buffer definitions used by etcd-client
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      
      # Step 3: Install CMake for rdkafka build
      # Required for building Kafka client C dependencies
      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      # Step 4: Install system dependencies for rdkafka
      # Install curl and SASL libraries required by Kafka client
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      # Step 5: Build Rust library in release mode
      # Compiles libdmsc as a cdylib for aarch64-unknown-linux-gnu target
      # Native ARM64 compilation ensures correct code generation for the target arch
      # Output location: target/release/libdmsc.so
      - name: Build
        run: cargo build --release
      
      # Step 6: Upload compiled library artifact
      # Artifact is named rust-linux-arm64 for identification
      # Contains .so files for Python wheel building on Linux ARM64 platforms
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-linux-arm64
          path: target/release/libdmsc.*

  ################################################################################
  # Job: Build Rust Library for Windows x64
  ################################################################################
  # Compiles Rust library as cdylib for Windows x64 (x86_64-pc-windows-msvc target)
  # Uses windows-latest runner for native compilation without cross-compilation overhead
  # The resulting .dll file is suitable for use with Python on Windows x64 systems
  build-rust-windows:
    # Use Windows latest runner for native Windows x64 builds
    # Provides MSVC toolchain and Windows SDK for compilation
    runs-on: windows-latest
    steps:
      # Step 1: Checkout repository source code
      # Clones repository on Windows runner for native compilation
      - uses: actions/checkout@v4
      
      # Step 2: Install protoc (Protocol Buffers compiler) for etcd-client build
      # etcd-client requires protoc to compile .proto files during build
      # repo-token is required for Windows to authenticate with GitHub API
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      
      # Step 3: Install CMake for rdkafka build
      # Required for building Kafka client dependencies on Windows
      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'
      
      # Step 4: Build Rust library in release mode
      # Compiles libdmsc as a cdylib for x86_64-pc-windows-msvc target
      # Default MSVC toolchain on Windows provides optimal Windows compatibility
      # Output location: target/release/libdmsc.dll
      - name: Build
        run: cargo build --release
      
      # Step 5: Upload compiled library artifact
      # Artifact is named rust-windows-x64 for identification
      # Contains .dll files for Python wheel building on Windows x64 platforms
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-windows-x64
          path: target/release/libdmsc.*

  ################################################################################
  # Job: Build Rust Library for macOS x64
  ################################################################################
  # Note: macOS-15-intel is x64 runner (will be available until Aug 2027)
  # Required because newer macOS runners only support ARM64 natively
  # This job runs on Intel-based macOS runners to produce x64 (x86_64-apple-darwin) binaries
  # Native compilation on Intel Mac provides optimal build performance for x64 targets
  # Compiles Rust library as cdylib for macOS x64 architecture
  # The resulting .dylib file is suitable for use with Python on macOS x64 systems
  build-rust-macos:
    # Use Intel-based macOS runner for x64 builds
    # macos-15-intel provides native x86_64 environment for Intel Macs
    runs-on: macos-15-intel
    steps:
      # Step 1: Checkout repository source code
      - uses: actions/checkout@v4

      # Step 2: Install protoc for etcd-client build
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Install macOS dependencies via Homebrew
      # Installs cmake and pkg-config for building native dependencies
      # Also upgrades pip, setuptools, and wheel for Python package building
      - name: Install dependencies
        run: |
          brew update
          brew install cmake pkg-config || true
          brew upgrade cmake pkg-config || true
          pip install --upgrade pip setuptools wheel || true
      
      # Step 4: Set up Rust toolchain for x86_64-apple-darwin target
      # Installs stable Rust and adds the macOS x64 target
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-apple-darwin

      # Step 5: Configure macOS linker for PyO3 cdylib builds
      # This configuration allows Python C API symbols to be resolved at load time
      # instead of link time, which is required for Python extension modules on macOS
      # The -undefined dynamic_lookup flag tells the linker to defer symbol resolution
      - name: Configure macOS linker for PyO3
        run: |
          mkdir -p .cargo
          echo '[target.x86_64-apple-darwin]' > .cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> .cargo/config.toml
      
      # Step 6: Build Rust library for x86_64-apple-darwin target
      - name: Build Rust library
        run: cargo build --release --target x86_64-apple-darwin
      
      # Step 7: List build artifacts for debugging
      # Displays the contents of the release directory to verify build success
      - name: List artifacts
        run: |
          echo "=== Contents of target/x86_64-apple-darwin/release/ ==="
          ls -la target/x86_64-apple-darwin/release/ 2>/dev/null || echo "Build directory not found"
          echo ""
          echo "=== Looking for libdmsc files ==="
          find target -name "libdmsc*" -type f 2>/dev/null || echo "No libdmsc files found"
      
      # Step 8: Upload compiled library artifact
      # Artifact is named rust-macos-x64 for identification
      # Contains .dylib files for Python wheel building on macOS x64
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-macos-x64
          path: target/x86_64-apple-darwin/release/libdmsc.*

  ################################################################################
  # Job: Build Rust Library for macOS ARM64
  ################################################################################
  build-rust-macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          brew update
          brew install cmake pkg-config || true
          pip install --upgrade pip setuptools wheel || true
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Configure macOS linker for PyO3
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-apple-darwin]' > .cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> .cargo/config.toml
      
      - name: Build Rust library
        run: cargo build --release --target aarch64-apple-darwin
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-macos-arm64
          path: target/aarch64-apple-darwin/release/libdmsc.*

  ################################################################################
  # Job: Build Rust Library for Windows ARM64
  ################################################################################
  build-rust-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-pc-windows-msvc

      - name: Build Rust library
        run: cargo build --release --target aarch64-pc-windows-msvc
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-windows-arm64
          path: target/aarch64-pc-windows-msvc/release/dmsc.dll

  ################################################################################
  # Job: Build C/C++ Static Libraries and Headers for Linux x64
  ################################################################################
  # This job compiles the DMSC library as a static library (staticlib) for C/C++ usage
  # Generates platform-specific static libraries (.a files) and C header files
  ################################################################################
  build-c-libs-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Build C static library
        run: cargo build --release --no-default-features --features c

      - name: Generate C headers
        run: |
          mkdir -p include
          # Generate header file with all exported functions
          echo "/* DMSC C API Header - Auto-generated */" > include/dmsc.h
          echo "#ifndef DMSC_H" >> include/dmsc.h
          echo "#define DMSC_H" >> include/dmsc.h
          echo "" >> include/dmsc.h
          echo "#include <stdint.h>" >> include/dmsc.h
          echo "#include <stddef.h>" >> include/dmsc.h
          echo "" >> include/dmsc.h
          echo "#ifdef __cplusplus" >> include/dmsc.h
          echo "extern \"C\" {" >> include/dmsc.h
          echo "#endif" >> include/dmsc.h
          echo "" >> include/dmsc.h
          echo "/* Library Management */" >> include/dmsc.h
          echo "int dmsc_init(void);" >> include/dmsc.h
          echo "void dmsc_cleanup(void);" >> include/dmsc.h
          echo "const char* dmsc_version(void);" >> include/dmsc.h
          echo "void dmsc_string_free(char* s);" >> include/dmsc.h
          echo "" >> include/dmsc.h
          echo "/* Core Module */" >> include/dmsc.h
          echo "typedef struct CDMSCAppBuilder CDMSCAppBuilder;" >> include/dmsc.h
          echo "typedef struct CDMSCConfig CDMSCConfig;" >> include/dmsc.h
          echo "CDMSCAppBuilder* dmsc_app_builder_new(void);" >> include/dmsc.h
          echo "void dmsc_app_builder_free(CDMSCAppBuilder* builder);" >> include/dmsc.h
          echo "CDMSCConfig* dmsc_config_new(void);" >> include/dmsc.h
          echo "void dmsc_config_free(CDMSCConfig* config);" >> include/dmsc.h
          echo "char* dmsc_config_get_string(CDMSCConfig* config, const char* key);" >> include/dmsc.h
          echo "int dmsc_config_set_string(CDMSCConfig* config, const char* key, const char* value);" >> include/dmsc.h
          echo "" >> include/dmsc.h
          echo "#ifdef __cplusplus" >> include/dmsc.h
          echo "}" >> include/dmsc.h
          echo "#endif" >> include/dmsc.h
          echo "" >> include/dmsc.h
          echo "#endif /* DMSC_H */" >> include/dmsc.h

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-libs-linux-x64
          path: |
            target/release/libdmsc.a
            include/dmsc.h

  ################################################################################
  # Job: Build C/C++ Static Libraries and Headers for Linux ARM64
  ################################################################################
  build-c-libs-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Build C static library
        run: cargo build --release --no-default-features --features c

      - name: Generate C headers
        run: |
          mkdir -p include
          echo "/* DMSC C API Header - Auto-generated */" > include/dmsc.h
          echo "#ifndef DMSC_H" >> include/dmsc.h
          echo "#define DMSC_H" >> include/dmsc.h
          echo "" >> include/dmsc.h
          echo "#include <stdint.h>" >> include/dmsc.h
          echo "#include <stddef.h>" >> include/dmsc.h
          echo "" >> include/dmsc.h
          echo "#ifdef __cplusplus" >> include/dmsc.h
          echo "extern \"C\" {" >> include/dmsc.h
          echo "#endif" >> include/dmsc.h
          echo "" >> include/dmsc.h
          echo "/* Library Management */" >> include/dmsc.h
          echo "int dmsc_init(void);" >> include/dmsc.h
          echo "void dmsc_cleanup(void);" >> include/dmsc.h
          echo "const char* dmsc_version(void);" >> include/dmsc.h
          echo "void dmsc_string_free(char* s);" >> include/dmsc.h
          echo "" >> include/dmsc.h
          echo "/* Core Module */" >> include/dmsc.h
          echo "typedef struct CDMSCAppBuilder CDMSCAppBuilder;" >> include/dmsc.h
          echo "typedef struct CDMSCConfig CDMSCConfig;" >> include/dmsc.h
          echo "CDMSCAppBuilder* dmsc_app_builder_new(void);" >> include/dmsc.h
          echo "void dmsc_app_builder_free(CDMSCAppBuilder* builder);" >> include/dmsc.h
          echo "CDMSCConfig* dmsc_config_new(void);" >> include/dmsc.h
          echo "void dmsc_config_free(CDMSCConfig* config);" >> include/dmsc.h
          echo "char* dmsc_config_get_string(CDMSCConfig* config, const char* key);" >> include/dmsc.h
          echo "int dmsc_config_set_string(CDMSCConfig* config, const char* key, const char* value);" >> include/dmsc.h
          echo "" >> include/dmsc.h
          echo "#ifdef __cplusplus" >> include/dmsc.h
          echo "}" >> include/dmsc.h
          echo "#endif" >> include/dmsc.h
          echo "" >> include/dmsc.h
          echo "#endif /* DMSC_H */" >> include/dmsc.h

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-libs-linux-arm64
          path: |
            target/release/libdmsc.a
            include/dmsc.h

  ################################################################################
  # Job: Build C/C++ Static Libraries and Headers for Windows x64
  ################################################################################
  build-c-libs-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Build C static library
        run: cargo build --release --no-default-features --features c

      - name: Generate C headers
        shell: cmd
        run: |
          mkdir include 2>nul
          echo /* DMSC C API Header - Auto-generated */ > include\dmsc.h
          echo #ifndef DMSC_H >> include\dmsc.h
          echo #define DMSC_H >> include\dmsc.h
          echo. >> include\dmsc.h
          echo #include ^<stdint.h^> >> include\dmsc.h
          echo #include ^<stddef.h^> >> include\dmsc.h
          echo. >> include\dmsc.h
          echo #ifdef __cplusplus >> include\dmsc.h
          echo extern "C" { >> include\dmsc.h
          echo #endif >> include\dmsc.h
          echo. >> include\dmsc.h
          echo /* Library Management */ >> include\dmsc.h
          echo int dmsc_init(void); >> include\dmsc.h
          echo void dmsc_cleanup(void); >> include\dmsc.h
          echo const char* dmsc_version(void); >> include\dmsc.h
          echo void dmsc_string_free(char* s); >> include\dmsc.h
          echo. >> include\dmsc.h
          echo /* Core Module */ >> include\dmsc.h
          echo typedef struct CDMSCAppBuilder CDMSCAppBuilder; >> include\dmsc.h
          echo typedef struct CDMSCConfig CDMSCConfig; >> include\dmsc.h
          echo CDMSCAppBuilder* dmsc_app_builder_new(void); >> include\dmsc.h
          echo void dmsc_app_builder_free(CDMSCAppBuilder* builder); >> include\dmsc.h
          echo CDMSCConfig* dmsc_config_new(void); >> include\dmsc.h
          echo void dmsc_config_free(CDMSCConfig* config); >> include\dmsc.h
          echo char* dmsc_config_get_string(CDMSCConfig* config, const char* key); >> include\dmsc.h
          echo int dmsc_config_set_string(CDMSCConfig* config, const char* key, const char* value); >> include\dmsc.h
          echo. >> include\dmsc.h
          echo #ifdef __cplusplus >> include\dmsc.h
          echo } >> include\dmsc.h
          echo #endif >> include\dmsc.h
          echo. >> include\dmsc.h
          echo #endif /* DMSC_H */ >> include\dmsc.h

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-libs-windows-x64
          path: |
            target/release/dmsc.lib
            include/dmsc.h

  ################################################################################
  # Job: Build C/C++ Static Libraries and Headers for macOS x64
  ################################################################################
  build-c-libs-macos:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          brew update
          brew install cmake pkg-config openssl || true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-apple-darwin

      - name: Build C static library
        run: cargo build --release --target x86_64-apple-darwin --no-default-features --features c

      - name: Generate C headers
        run: |
          mkdir -p include
          echo "/* DMSC C API Header - Auto-generated */" > include/dmsc.h
          echo "#ifndef DMSC_H" >> include/dmsc.h
          echo "#define DMSC_H" >> include/dmsc.h
          echo "" >> include/dmsc.h
          echo "#include <stdint.h>" >> include/dmsc.h
          echo "#include <stddef.h>" >> include/dmsc.h
          echo "" >> include/dmsc.h
          echo "#ifdef __cplusplus" >> include/dmsc.h
          echo "extern \"C\" {" >> include/dmsc.h
          echo "#endif" >> include/dmsc.h
          echo "" >> include/dmsc.h
          echo "/* Library Management */" >> include/dmsc.h
