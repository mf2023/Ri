################################################################################
# Ri Rust Library and Python Wheel Build Pipeline
################################################################################
#
# PURPOSE:
# This GitHub Actions workflow orchestrates the complete build process for Ri,
# a high-performance middleware framework written in Rust with Python bindings.
# The pipeline generates distributable artifacts across multiple platforms.
#
# ARTIFACT TYPES GENERATED:
# 1. Rust Dynamic Libraries (cdylib): Native Rust binaries for each platform
#    - Linux:   .so files (libri.so)
#    - Windows: .dll files (libri.dll)
#    - macOS:   .dylib files (libri.dylib)
#
# 2. Python Wheel Packages (.whl): Distributable Python packages with embedded
#    Rust binaries, installable via pip
#
# 3. C Static Libraries (.a/.lib): For C/C++ integration scenarios
#    - Linux:   .a files (libri.a)
#    - Windows: .lib files (ri.lib)
#    - macOS:   .a files (libri.a)
#
# 4. C Header Files (.h): C API declarations for direct C/C++ usage
#
# ARCHITECTURE OVERVIEW:
# The build process follows a multi-phase approach:
#
#   Phase 1: CLI Tool Compilation
#   ┌─────────────────────────────────────────────────────────────┐
#   │  build-cli-linux        → ric (x64)                       │
#   │  build-cli-linux-arm64  → ric (ARM64)                     │
#   │  build-cli-windows      → ric.exe (x64)                   │
#   │  build-cli-windows-arm64→ ric.exe (ARM64)                 │
#   │  build-cli-macos        → ric (x64)                       │
#   │  build-cli-macos-arm64  → ric (ARM64)                     │
#   └─────────────────────────────────────────────────────────────┘
#
#   Phase 2: Rust Library Compilation
#   ┌─────────────────────────────────────────────────────────────┐
#   │  build-rust-linux        → libri.so (x64)                │
#   │  build-rust-linux-arm64  → libri.so (ARM64)              │
#   │  build-rust-windows      → libri.dll (x64)                │
#   │  build-rust-macos        → libri.dylib (x64)              │
#   │  build-rust-macos-arm64  → libri.dylib (ARM64)            │
#   │  build-rust-windows-arm64→ libri.dll (ARM64)              │
#   └─────────────────────────────────────────────────────────────┘
#
#   Phase 3: C Library Compilation (parallel with Phase 2)
#   ┌─────────────────────────────────────────────────────────────┐
#   │  build-c-libs-linux        → libri.a + ri.h             │
#   │  build-c-libs-linux-arm64  → libri.a + ri.h             │
#   │  build-c-libs-windows      → ri.lib + ri.h               │
#   │  build-c-libs-macos        → libri.a + ri.h             │
#   │  build-c-libs-macos-arm64  → libri.a + ri.h             │
#   │  build-c-libs-windows-arm64→ ri.lib + ri.h             │
#   └─────────────────────────────────────────────────────────────┘
#
#   Phase 4: Python Wheel Generation
#   ┌─────────────────────────────────────────────────────────────┐
#   │  build-python (matrix job)                                   │
#   │  - 7 Python versions × 6 platforms = 42 wheel combinations   │
#   │  - Each wheel includes pre-compiled Rust binary              │
#   └─────────────────────────────────────────────────────────────┘
#
# SUPPORTED PLATFORMS AND ARCHITECTURES:
# ┌─────────────┬──────────┬──────────────────────────────────────┐
# │ Platform    │ Arch     │ Notes                                │
# ├─────────────┼──────────┼──────────────────────────────────────┤
# │ Linux       │ x64      │ glibc 2.17+ (manylinux2014)          │
# │ Linux       │ ARM64    │ Native build on ubuntu-24.04-arm    │
# │ Windows     │ x64      │ MSVC toolchain                       │
# │ Windows     │ ARM64    │ Native build on windows-11-arm       │
# │ macOS       │ x64      │ Intel Macs (until Aug 2027)         │
# │ macOS       │ ARM64    │ Apple Silicon (M1/M2/M3/M4)          │
# └─────────────┴──────────┴──────────────────────────────────────┘
#
# SUPPORTED PYTHON VERSIONS: 3.8, 3.9, 3.10, 3.11, 3.12, 3.13, 3.14
#
# TRIGGER CONDITIONS:
# - push to master branch:    Automatic build for all platforms
# - release published:        Full release pipeline + PyPI publishing
# - workflow_dispatch:         Manual trigger for testing/verification
#
# BUILD TOOLCHAIN:
# - maturin: Rust/Python integration build tool
# - cargo:   Rust package manager and build system
# - CMake:   Build system for C dependencies (rdkafka)
# - protoc:  Protocol Buffers compiler (etcd-client dependency)
#
# KEY DEPENDENCIES:
# - etcd-client: Service discovery and configuration management
# - rdkafka:     Kafka message streaming client
# - PyO3:        Rust/Python bindings generation
#
# ARTIFACT RETENTION:
# - GitHub Actions artifacts: Available for 90 days
# - PyPI packages: Permanently available after publication
################################################################################

name: Build and Publish Ri (Rust/C/Python)

on:
  push:
    branches:
      - master
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ################################################################################
  # CLI TOOL COMPILATION JOBS
  ################################################################################
  # These jobs compile the ric CLI tool for each target platform.
  # The CLI tool provides project scaffolding, build management, and development utilities.
  #
  # Build Output: Binary executables (ric/ric.exe)
  # Platforms: Linux (x64/ARM64), Windows (x64/ARM64), macOS (x64/ARM64)
  ################################################################################

  build-cli-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install system dependencies
        run: make setup-deps

      - name: Build CLI
        run: make build-cli-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-linux-x64
          path: target/x86_64-unknown-linux-gnu/release/ric

  build-cli-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install system dependencies
        run: make setup-deps

      - name: Build CLI
        run: make build-cli-linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-linux-arm64
          path: target/aarch64-unknown-linux-gnu/release/ric

  build-cli-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenSSL
        run: |
          vcpkg install openssl:x64-windows
          vcpkg integrate install
          echo "OPENSSL_ROOT_DIR=C:\vcpkg\installed\x64-windows" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=C:\vcpkg\installed\x64-windows\include" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=C:\vcpkg\installed\x64-windows\lib" >> $env:GITHUB_ENV

      - name: Build CLI
        run: make build-cli-windows-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-windows-x64
          path: target/x86_64-pc-windows-msvc/release/ric.exe

  build-cli-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-pc-windows-msvc

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenSSL
        run: |
          vcpkg install openssl:arm64-windows
          vcpkg integrate install
          echo "OPENSSL_ROOT_DIR=C:\vcpkg\installed\arm64-windows" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=C:\vcpkg\installed\arm64-windows\include" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=C:\vcpkg\installed\arm64-windows\lib" >> $env:GITHUB_ENV

      - name: Build CLI
        run: make build-cli-windows-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-windows-arm64
          path: target/aarch64-pc-windows-msvc/release/ric.exe

  build-cli-macos:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-apple-darwin

      - name: Install dependencies
        run: brew install --quiet cmake pkg-config openssl

      - name: Build CLI
        run: make build-cli-macos-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-macos-x64
          path: target/x86_64-apple-darwin/release/ric

  build-cli-macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: brew install --quiet cmake pkg-config openssl

      - name: Build CLI
        run: make build-cli-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-macos-arm64
          path: target/aarch64-apple-darwin/release/ric

  ################################################################################
  # RUST LIBRARY COMPILATION JOBS
  ################################################################################
  # These jobs compile the Rust library as a cdylib (C dynamic library) for each
  # target platform. The cdylib format allows Python's ctypes or PyO3 to load
  # the native Rust code at runtime.
  #
  # Build Output: Dynamic library files (.so/.dll/.dylib)
  # Used by: Python wheel build jobs (via artifact download)
  ################################################################################

  build-rust-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install system dependencies
        run: make setup-deps

      - name: Build
        run: make build-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-linux-x64
          path: target/x86_64-unknown-linux-gnu/release/libri.*

  build-rust-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install system dependencies
        run: make setup-deps

      - name: Build
        run: make build-linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-linux-arm64
          path: target/release/libri.*

  build-rust-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenSSL
        run: |
          vcpkg install openssl:x64-windows
          vcpkg integrate install
          echo "OPENSSL_ROOT_DIR=C:\vcpkg\installed\x64-windows" >> $env:GITHUB_ENV

      - name: Build
        run: make build-windows-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-windows-x64
          path: target/x86_64-pc-windows-msvc/release/ri.*

  build-rust-macos:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-apple-darwin

      - name: Install dependencies
        run: brew install --quiet cmake pkg-config openssl

      - name: Build Rust library
        run: make build-macos-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-macos-x64
          path: target/x86_64-apple-darwin/release/libri.*

  build-rust-macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: brew install --quiet cmake pkg-config openssl

      - name: Build Rust library
        run: make build-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-macos-arm64
          path: target/aarch64-apple-darwin/release/libri.*

  build-rust-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-pc-windows-msvc

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenSSL
        run: |
          vcpkg install openssl:arm64-windows
          vcpkg integrate install
          echo "OPENSSL_ROOT_DIR=C:\vcpkg\installed\arm64-windows" >> $env:GITHUB_ENV

      - name: Build Rust library
        run: make build-windows-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-windows-arm64
          path: target/aarch64-pc-windows-msvc/release/ri.dll

  ################################################################################
  # C LIBRARY COMPILATION JOBS
  ################################################################################
  # These jobs compile the Rust library as a static library (.a/.lib) for C/C++
  # integration. Static linking is preferred for C applications as it avoids
  # runtime library dependencies.
  #
  # Build Output: Static library files + C header file
  # Used by: C/C++ applications linking against Ri
  ################################################################################

  build-c-libs-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install system dependencies
        run: make setup-deps

      - name: Build C static library
        run: make build-c-linux-x64

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-libs-linux-x64
          path: |
            target/x86_64-unknown-linux-gnu/release/libri.a
            include/ri.h

  build-c-libs-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install system dependencies
        run: make setup-deps

      - name: Build C static library
        run: make build-c-linux-arm64

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-libs-linux-arm64
          path: |
            target/aarch64-unknown-linux-gnu/release/libri.a
            include/ri.h

  build-c-libs-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenSSL
        run: |
          vcpkg install openssl:x64-windows
          vcpkg integrate install
          echo "OPENSSL_ROOT_DIR=C:\vcpkg\installed\x64-windows" >> $env:GITHUB_ENV

      - name: Build C static library
        run: make build-c-windows-x64

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-libs-windows-x64
          path: |
            target/x86_64-pc-windows-msvc/release/ri.lib
            include/ri.h

  build-c-libs-macos:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-apple-darwin

      - name: Install dependencies
        run: brew install --quiet cmake pkg-config openssl

      - name: Build C static library
        run: make build-c-macos-x64

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-libs-macos-x64
          path: |
            target/x86_64-apple-darwin/release/libri.a
            include/ri.h

  build-c-libs-macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: brew install --quiet cmake pkg-config openssl

      - name: Build C static library
        run: make build-c-macos-arm64

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-libs-macos-arm64
          path: |
            target/aarch64-apple-darwin/release/libri.a
            include/ri.h

  build-c-libs-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-pc-windows-msvc

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenSSL
        run: |
          vcpkg install openssl:arm64-windows
          vcpkg integrate install
          echo "OPENSSL_ROOT_DIR=C:\vcpkg\installed\arm64-windows" >> $env:GITHUB_ENV

      - name: Build C static library
        run: make build-c-windows-arm64

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-libs-windows-arm64
          path: |
            target/aarch64-pc-windows-msvc/release/ri.lib
            include/ri.h

  ################################################################################
  # JAVA LIBRARY BUILD JOB
  ################################################################################
  # This job compiles the Java bindings and packages them into a JAR file.
  # The Java bindings use JNI to call into the Rust library.
  #
  # Build Output: JAR file with embedded native libraries
  # Used by: Java applications using Ri
  ################################################################################

  build-java:
    runs-on: ubuntu-latest
    needs: [build-rust-linux, build-rust-linux-arm64, build-rust-windows, build-rust-windows-arm64, build-rust-macos, build-rust-macos-arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Download Linux x64 native library
        uses: actions/download-artifact@v4
        with:
          name: rust-linux-x64
          path: native/linux-x64

      - name: Download Linux ARM64 native library
        uses: actions/download-artifact@v4
        with:
          name: rust-linux-arm64
          path: native/linux-arm64

      - name: Download Windows x64 native library
        uses: actions/download-artifact@v4
        with:
          name: rust-windows-x64
          path: native/windows-x64

      - name: Download macOS x64 native library
        uses: actions/download-artifact@v4
        with:
          name: rust-macos-x64
          path: native/macos-x64

      - name: Download macOS ARM64 native library
        uses: actions/download-artifact@v4
        with:
          name: rust-macos-arm64
          path: native/macos-arm64

      - name: Download Windows ARM64 native library
        uses: actions/download-artifact@v4
        with:
          name: rust-windows-arm64
          path: native/windows-arm64

      - name: Organize native libraries
        run: |
          mkdir -p java/src/main/resources/native/linux-x64
          mkdir -p java/src/main/resources/native/linux-arm64
          mkdir -p java/src/main/resources/native/windows-x64
          mkdir -p java/src/main/resources/native/windows-arm64
          mkdir -p java/src/main/resources/native/macos-x64
          mkdir -p java/src/main/resources/native/macos-arm64
          
          cp native/linux-x64/libri.so java/src/main/resources/native/linux-x64/ 2>/dev/null || true
          cp native/linux-arm64/libri.so java/src/main/resources/native/linux-arm64/ 2>/dev/null || true
          cp native/windows-x64/ri.dll java/src/main/resources/native/windows-x64/ 2>/dev/null || true
          cp native/windows-arm64/ri.dll java/src/main/resources/native/windows-arm64/ 2>/dev/null || true
          cp native/macos-x64/libri.dylib java/src/main/resources/native/macos-x64/ 2>/dev/null || true
          cp native/macos-arm64/libri.dylib java/src/main/resources/native/macos-arm64/ 2>/dev/null || true

      - name: Build with Maven
        run: |
          cd java
          mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-library
          path: java/target/ri-*.jar

  ################################################################################
  # PYTHON WHEEL BUILD JOB (MATRIX)
  ################################################################################
  # This job generates Python wheel packages (.whl) for all supported platforms,
  # architectures, and Python versions. It uses maturin as the build tool to
  # compile the Rust library and generate Python bindings in a single step.
  #
  # MATRIX STRATEGY:
  # The matrix generates 42 unique build combinations:
  # - 7 Python versions (3.8-3.14)
  # - 6 platform/architecture targets
  #
  # For Linux builds, a manylinux Docker container is used to ensure binary
  # compatibility with older glibc versions (2.17+).
  #
  # For macOS and Windows, native runners are used with platform-specific formats.
  #
  # BUILD OUTPUT: Python wheel files (.whl) installable via pip
  # ARTIFACT NAME: python-{target}-{python_version}
  ################################################################################

  build-python:
    runs-on: ${{ matrix.runs-on }}
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
      CARGO_HTTP_TIMEOUT: '60'
      CARGO_NET_GIT_FETCH_WITH_CLI: 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64: 7 Python versions (3.8-3.14)
          # Uses manylinux_2_17 container for glibc 2.17+ compatibility
          # Supports: Ubuntu 18.04+, CentOS 7+, Debian 9+, RHEL 7+
          - python: '3.8'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.9'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.10'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.11'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.12'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.13'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.14'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true

          # Linux ARM64: 7 Python versions (3.8-3.14)
          # Native ARM64 build on ubuntu-24.04-arm runner
          # Supports: AWS Graviton, Raspberry Pi OS, older ARM64 Linux
          - python: '3.8'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.9'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.10'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.11'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.12'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.13'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.14'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true

          # Windows x64: 7 Python versions (3.8-3.14)
          # Native Windows build using MSVC toolchain
          - python: '3.8'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.9'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.10'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.11'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.12'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.13'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.14'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null

          # Windows ARM64: 4 Python versions (3.11-3.14)
          # Python ARM64 on Windows only supports 3.11+
          - python: '3.11'
            runs-on: windows-11-arm
            target: aarch64-pc-windows-msvc
            manylinux: null
          - python: '3.12'
            runs-on: windows-11-arm
            target: aarch64-pc-windows-msvc
            manylinux: null
          - python: '3.13'
            runs-on: windows-11-arm
            target: aarch64-pc-windows-msvc
            manylinux: null
          - python: '3.14'
            runs-on: windows-11-arm
            target: aarch64-pc-windows-msvc
            manylinux: null

          # macOS x64: 7 Python versions (3.8-3.14)
          # Uses macos-15-intel runner (available until Aug 2027)
          # Newer macOS runners only support ARM64 natively
          - python: '3.8'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.9'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.10'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.11'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.12'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.13'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.14'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null

          # macOS ARM64: 7 Python versions (3.8-3.14)
          # Native Apple Silicon build on macos-15 runner
          - python: '3.8'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.9'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.10'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.11'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.12'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.13'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.14'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: make setup-deps

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install --quiet cmake pkg-config openssl

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenSSL (Windows x64)
        if: runner.os == 'Windows' && !contains(matrix.target, 'aarch64')
        run: |
          vcpkg install openssl:x64-windows
          vcpkg integrate install
          echo "OPENSSL_ROOT_DIR=C:\vcpkg\installed\x64-windows" >> $env:GITHUB_ENV

      - name: Install OpenSSL (Windows ARM64)
        if: runner.os == 'Windows' && contains(matrix.target, 'aarch64')
        run: |
          vcpkg install openssl:arm64-windows
          vcpkg integrate install
          echo "OPENSSL_ROOT_DIR=C:\vcpkg\installed\arm64-windows" >> $env:GITHUB_ENV

      - name: Configure macOS linker
        if: matrix.target == 'x86_64-apple-darwin' || matrix.target == 'aarch64-apple-darwin'
        run: |
          sudo dscacheutil -flushcache 2>/dev/null || true
          sudo killall -HUP mDNSResponder 2>/dev/null || true

          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999

          mkdir -p .cargo
          cat > .cargo/config.toml << 'CARGO_EOF'
          [target.x86_64-apple-darwin]
          rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

          [target.aarch64-apple-darwin]
          rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

          [net]
          retry = 5

          [http]
          timeout = 60
          CARGO_EOF

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/Library/Caches/pip
            ~\AppData\Local\pip\Cache
          key: pip-${{ matrix.python }}-${{ matrix.target }}-${{ hashFiles('**/pyproject.toml', '**/Cargo.toml') }}
          restore-keys: |
            pip-${{ matrix.python }}-${{ matrix.target }}-
            pip-${{ matrix.python }}-

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ matrix.target }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            rust-${{ matrix.target }}-
            rust-

      - name: Configure static linking
        if: runner.os == 'Linux'
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'CARGO_EOF'
          [profile.release]
          lto = true
          codegen-units = 1
          strip = true
          CARGO_EOF

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Install dependencies
        run: pip install maturin auditwheel -i https://pypi.org/simple --quiet

      - name: Build wheel (non-Docker, non-Windows-ARM64)
        if: matrix.docker != true && matrix.target != 'aarch64-pc-windows-msvc'
        run: make build-python TARGET=${{ matrix.target }}

      - name: Build wheel (Windows ARM64 - no protocol/oqs)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: make build-python TARGET=${{ matrix.target }} PLATFORM=windows ARCH=arm64

      - name: Build Linux wheel with manylinux
        if: matrix.docker == true
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          maturin-version: v1.8.3
          args: --release -o dist
          before-script-linux: |
            # Install Perl IPC::Cmd for OpenSSL build
            yum install -y perl perl-IPC-Cmd || apt-get install -y perl libipc-cmd-perl || true
            # Use Makefile to install dependencies (handles all Linux distros)
            make setup-deps || echo "Setup deps completed with some warnings"
            # Configure correct Python version for maturin
            PYTHON_VER="${{ matrix.python }}"
            PYTHON_MAJOR=$(echo "$PYTHON_VER" | cut -d. -f1)
            PYTHON_MINOR=$(echo "$PYTHON_VER" | cut -d. -f2)
            PYTHON_BIN="/opt/python/cp${PYTHON_MAJOR}${PYTHON_MINOR}-cp${PYTHON_MAJOR}${PYTHON_MINOR}/bin/python"
            if [ -f "$PYTHON_BIN" ]; then
              export PATH="$(dirname $PYTHON_BIN):$PATH"
              ln -sf "$PYTHON_BIN" /usr/local/bin/python3 || true
              ln -sf "$PYTHON_BIN" /usr/local/bin/python || true
            fi

      - name: List generated files
        shell: bash
        run: |
          ls -la dist/ 2>/dev/null || echo "No files in dist"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.target }}-${{ matrix.python }}
          path: dist/

  ################################################################################
  # PYPI PUBLISHING JOBS
  ################################################################################
  # These jobs publish the built Python wheels to PyPI (or TestPyPI for testing).
  # They run only when a GitHub Release is published and depend on the build-python
  # job completing successfully.
  #
  # publish-pypi:   Publishes to production PyPI (for production releases)
  # publish-testpypi: Publishes to TestPyPI (for test releases)
  #
  # PUBLICATION REQUIREMENTS:
  # - GitHub secret PYPI_API_TOKEN must be configured
  # - Release title determines target repository:
  #   - Contains "Test": → TestPyPI
  #   - No "Test":        → PyPI (production)
  ################################################################################

  publish-pypi:
    needs: build-python
    if: github.event_name == 'release' && !contains(github.event.release.name, 'Test')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: python-*
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install twine
        run: pip install twine

      - name: Publish to PyPI
        run: |
          twine upload dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  ################################################################################
  # Job: Publish to crates.io (Production Releases)
  ################################################################################
  # Publishes the Rust crate to crates.io registry when a GitHub Release is published
  # Only runs when GitHub Release title does NOT contain "Test"
  # This makes the library available to other Rust projects via cargo
  ################################################################################
  publish-crate:
    needs: [build-rust-linux, build-rust-linux-arm64, build-rust-windows, build-rust-windows-arm64, build-rust-macos, build-rust-macos-arm64]
    
    if: github.event_name == 'release' && !contains(github.event.release.name, 'Test')
    
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ github.token }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install system dependencies
        run: make setup-deps

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  ################################################################################
  # Job: Publish Java Library to Maven Central
  ################################################################################
  # This job builds the Java JAR with embedded native libraries and publishes to Maven Central
  # Only runs for production releases (not test releases)
  ################################################################################
  publish-maven:
    needs: [build-java]
    
    if: github.event_name == 'release' && !contains(github.event.release.name, 'Test')
    
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import || true

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: java-library
          path: java/target

      - name: Build and deploy to Maven Central
        run: |
          cd java
          mkdir -p ~/.m2
          echo '<settings><servers><server><id>central</id><username>${CENTRAL_USERNAME}</username><password>${CENTRAL_PASSWORD}</password></server></servers></settings>' > ~/.m2/settings.xml
          mvn deploy -P release -DskipTests
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  publish-testpypi:
    needs: build-python
    if: github.event_name == 'release' && contains(github.event.release.name, 'Test')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: python-*
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install twine
        run: pip install twine

      - name: Publish to TestPyPI
        run: |
          twine upload --repository-url https://test.pypi.org/legacy/ dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TEST_API_TOKEN }}

  ################################################################################
  # Job: Sync Release to Gitee
  ################################################################################
  # Creates the same release on Gitee with title, description, and tag
  # Runs for both test and production releases
  # This ensures the Chinese mirror (Gitee) has the same release information
  ################################################################################
  sync-to-gitee:
    # Depends on all build jobs completing successfully
    needs: [build-rust-linux, build-rust-linux-arm64, build-rust-windows, build-rust-windows-arm64, build-rust-macos, build-rust-macos-arm64, build-python]
    
    # Conditional: Run for any release (both test and production)
    if: github.event_name == 'release'
    
    # Use Ubuntu latest for API calls
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Sync release information to Gitee using API
      # Uses GITEE_TOKEN secret for authentication
      # Creates a release with the same tag, name, and body as GitHub
      # Note: Using jq to properly escape JSON special characters in release body
      - name: Sync Release to Gitee
        run: |
          # Gitee API endpoint for creating releases
          GITEE_API="https://gitee.com/api/v5/repos/dunimd/ri/releases"
          
          # Create JSON payload using jq to properly escape special characters
          jq -n \
            --arg token "${{ secrets.GITEE_TOKEN }}" \
            --arg tag "${{ github.event.release.tag_name }}" \
            --arg name "${{ github.event.release.name }}" \
            --arg body "${{ github.event.release.body }}" \
            '{
              access_token: $token,
              tag_name: $tag,
              name: $name,
              body: $body,
              prerelease: false,
              target_commitish: "master"
            }' > payload.json
          
          # Create release on Gitee using curl POST request
          curl -X POST "$GITEE_API" \
            -H "Content-Type: application/json" \
            -d @payload.json
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
