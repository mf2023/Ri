################################################################################
# DMSC Rust Library and Python Wheel Build Pipeline
################################################################################
#
# PURPOSE:
# This GitHub Actions workflow orchestrates the complete build process for DMSC,
# a high-performance middleware framework written in Rust with Python bindings.
# The pipeline generates distributable artifacts across multiple platforms.
#
# ARTIFACT TYPES GENERATED:
# 1. Rust Dynamic Libraries (cdylib): Native Rust binaries for each platform
#    - Linux:   .so files (libdmsc.so)
#    - Windows: .dll files (libdmsc.dll)
#    - macOS:   .dylib files (libdmsc.dylib)
#
# 2. Python Wheel Packages (.whl): Distributable Python packages with embedded
#    Rust binaries, installable via pip
#
# 3. C Static Libraries (.a/.lib): For C/C++ integration scenarios
#    - Linux:   .a files (libdmsc.a)
#    - Windows: .lib files (dmsc.lib)
#    - macOS:   .a files (libdmsc.a)
#
# 4. C Header Files (.h): C API declarations for direct C/C++ usage
#
# ARCHITECTURE OVERVIEW:
# The build process follows a two-phase approach:
#
#   Phase 1: Rust Library Compilation
#   ┌─────────────────────────────────────────────────────────────┐
#   │  build-rust-linux        → libdmsc.so (x64)                │
#   │  build-rust-linux-arm64  → libdmsc.so (ARM64)              │
#   │  build-rust-windows      → libdmsc.dll (x64)                │
#   │  build-rust-macos        → libdmsc.dylib (x64)              │
#   │  build-rust-macos-arm64  → libdmsc.dylib (ARM64)            │
#   │  build-rust-windows-arm64→ libdmsc.dll (ARM64)              │
#   └─────────────────────────────────────────────────────────────┘
#
#   Phase 2: C Library Compilation (parallel with Phase 1)
#   ┌─────────────────────────────────────────────────────────────┐
#   │  build-c-libs-linux        → libdmsc.a + dmsc.h             │
#   │  build-c-libs-linux-arm64  → libdmsc.a + dmsc.h             │
#   │  build-c-libs-windows      → dmsc.lib + dmsc.h               │
#   │  build-c-libs-macos        → libdmsc.a + dmsc.h             │
#   │  build-c-libs-macos-arm64  → libdmsc.a + dmsc.h             │
#   │  build-c-libs-windows-arm64→ dmsc.lib + dmsc.h             │
#   └─────────────────────────────────────────────────────────────┘
#
#   Phase 3: Python Wheel Generation
#   ┌─────────────────────────────────────────────────────────────┐
#   │  build-python (matrix job)                                   │
#   │  - 7 Python versions × 6 platforms = 42 wheel combinations   │
#   │  - Each wheel includes pre-compiled Rust binary              │
#   └─────────────────────────────────────────────────────────────┘
#
# SUPPORTED PLATFORMS AND ARCHITECTURES:
# ┌─────────────┬──────────┬──────────────────────────────────────┐
# │ Platform    │ Arch     │ Notes                                │
# ├─────────────┼──────────┼──────────────────────────────────────┤
# │ Linux       │ x64      │ glibc 2.17+ (manylinux2014)          │
# │ Linux       │ ARM64    │ Native build on ubuntu-24.04-arm    │
# │ Windows     │ x64      │ MSVC toolchain                       │
# │ Windows     │ ARM64    │ Native build on windows-11-arm       │
# │ macOS       │ x64      │ Intel Macs (until Aug 2027)         │
# │ macOS       │ ARM64    │ Apple Silicon (M1/M2/M3/M4)          │
# └─────────────┴──────────┴──────────────────────────────────────┘
#
# SUPPORTED PYTHON VERSIONS: 3.8, 3.9, 3.10, 3.11, 3.12, 3.13, 3.14
#
# TRIGGER CONDITIONS:
# - push to master branch:    Automatic build for all platforms
# - release published:        Full release pipeline + PyPI publishing
# - workflow_dispatch:         Manual trigger for testing/verification
#
# BUILD TOOLCHAIN:
# - maturin: Rust/Python integration build tool
# - cargo:   Rust package manager and build system
# - CMake:   Build system for C dependencies (rdkafka)
# - protoc:  Protocol Buffers compiler (etcd-client dependency)
#
# KEY DEPENDENCIES:
# - etcd-client: Service discovery and configuration management
# - rdkafka:     Kafka message streaming client
# - PyO3:        Rust/Python bindings generation
#
# ARTIFACT RETENTION:
# - GitHub Actions artifacts: Available for 90 days
# - PyPI packages: Permanently available after publication
################################################################################

name: Build and Publish DMSC (Rust/C/Python)

on:
  push:
    branches:
      - master
  release:
    types: [published]
  workflow_dispatch:

jobs:
  ################################################################################
  # RUST LIBRARY COMPILATION JOBS
  ################################################################################
  # These jobs compile the Rust library as a cdylib (C dynamic library) for each
  # target platform. The cdylib format allows Python's ctypes or PyO3 to load
  # the native Rust code at runtime.
  #
  # Build Output: Dynamic library files (.so/.dll/.dylib)
  # Used by: Python wheel build jobs (via artifact download)
  ################################################################################

  build-rust-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-linux-x64
          path: target/release/libdmsc.*

  build-rust-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-linux-arm64
          path: target/release/libdmsc.*

  build-rust-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-windows-x64
          path: target/release/libdmsc.*

  build-rust-macos:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          brew update --quiet 2>/dev/null || true
          brew install --quiet cmake pkg-config 2>/dev/null || true
          brew upgrade --quiet cmake pkg-config 2>/dev/null || true
          pip install --upgrade pip setuptools wheel 2>/dev/null || true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-apple-darwin

      - name: Configure macOS linker for PyO3
        run: |
          mkdir -p .cargo
          echo '[target.x86_64-apple-darwin]' > .cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> .cargo/config.toml

      - name: Build Rust library
        run: cargo build --release --target x86_64-apple-darwin

      - name: List artifacts
        run: |
          echo "=== Contents of target/x86_64-apple-darwin/release/ ==="
          ls -la target/x86_64-apple-darwin/release/ 2>/dev/null || echo "Build directory not found"
          echo ""
          echo "=== Looking for libdmsc files ==="
          find target -name "libdmsc*" -type f 2>/dev/null || echo "No libdmsc files found"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-macos-x64
          path: target/x86_64-apple-darwin/release/libdmsc.*

  build-rust-macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          brew update --quiet 2>/dev/null || true
          brew install --quiet cmake pkg-config 2>/dev/null || true
          pip install --upgrade pip setuptools wheel 2>/dev/null || true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Configure macOS linker for PyO3
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-apple-darwin]' > .cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> .cargo/config.toml

      - name: Build Rust library
        run: cargo build --release --target aarch64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-macos-arm64
          path: target/aarch64-apple-darwin/release/libdmsc.*

  build-rust-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-pc-windows-msvc

      - name: Build Rust library
        run: cargo build --release --target aarch64-pc-windows-msvc --no-default-features --features pyo3,c,java,grpc,websocket,rabbitmq,cache,queue,gateway,service_mesh,auth,observability,postgres,mysql,sqlite,http_client,system_info,config_hot_reload,protocol

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-windows-arm64
          path: target/aarch64-pc-windows-msvc/release/dmsc.dll

  ################################################################################
  # C LIBRARY COMPILATION JOBS
  ################################################################################
  # These jobs compile the Rust library as a static library (.a/.lib) for C/C++
  # integration. Static linking is preferred for C applications as it avoids
  # runtime library dependencies.
  #
  # Build Output: Static library files + C header file
  # Used by: C/C++ applications linking against DMSC
  ################################################################################

  build-c-libs-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Build C static library
        run: cargo build --release --no-default-features --features c

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Generate C headers
        run: |
          mkdir -p include
          cbindgen --crate dmsc -o include/dmsc.h

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-libs-linux-x64
          path: |
            target/release/libdmsc.a
            include/dmsc.h

  build-c-libs-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Build C static library
        run: cargo build --release --no-default-features --features c

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Generate C headers
        run: |
          mkdir -p include
          cbindgen --crate dmsc -o include/dmsc.h

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-libs-linux-arm64
          path: |
            target/release/libdmsc.a
            include/dmsc.h

  build-c-libs-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Build C static library
        run: cargo build --release --no-default-features --features c

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Generate C headers
        run: |
          mkdir include 2>nul || true
          cbindgen --crate dmsc -o include/dmsc.h

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-libs-windows-x64
          path: |
            target/release/dmsc.lib
            include/dmsc.h

  build-c-libs-macos:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          brew update --quiet 2>/dev/null || true
          brew install --quiet cmake pkg-config openssl 2>/dev/null || true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-apple-darwin

      - name: Build C static library
        run: cargo build --release --target x86_64-apple-darwin --no-default-features --features c

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Generate C headers
        run: |
          mkdir -p include
          cbindgen --crate dmsc -o include/dmsc.h

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-libs-macos-x64
          path: |
            target/x86_64-apple-darwin/release/libdmsc.a
            include/dmsc.h

  build-c-libs-macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          brew update
          brew install cmake pkg-config openssl || true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Build C static library
        run: cargo build --release --target aarch64-apple-darwin --no-default-features --features c

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Generate C headers
        run: |
          mkdir -p include
          cbindgen --crate dmsc -o include/dmsc.h

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-libs-macos-arm64
          path: |
            target/aarch64-apple-darwin/release/libdmsc.a
            include/dmsc.h

  build-c-libs-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-pc-windows-msvc

      - name: Build C static library
        run: cargo build --release --target aarch64-pc-windows-msvc --no-default-features --features c

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Generate C headers
        run: |
          mkdir -p include
          cbindgen --crate dmsc -o include/dmsc.h

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-libs-windows-arm64
          path: |
            target/aarch64-pc-windows-msvc/release/dmsc.lib
            include/dmsc.h

  ################################################################################
  # PYTHON WHEEL BUILD JOB (MATRIX)
  ################################################################################
  # This job generates Python wheel packages (.whl) for all supported platforms,
  # architectures, and Python versions. It uses maturin as the build tool to
  # compile the Rust library and generate Python bindings in a single step.
  #
  # MATRIX STRATEGY:
  # The matrix generates 42 unique build combinations:
  # - 7 Python versions (3.8-3.14)
  # - 6 platform/architecture targets
  #
  # For Linux builds, a manylinux Docker container is used to ensure binary
  # compatibility with older glibc versions (2.17+).
  #
  # For macOS and Windows, native runners are used with platform-specific formats.
  #
  # BUILD OUTPUT: Python wheel files (.whl) installable via pip
  # ARTIFACT NAME: python-{target}-{python_version}
  ################################################################################

  build-python:
    runs-on: ${{ matrix.runs-on }}
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
      CARGO_HTTP_TIMEOUT: '60'
      CARGO_NET_GIT_FETCH_WITH_CLI: 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64: 7 Python versions (3.8-3.14)
          # Uses manylinux_2_17 container for glibc 2.17+ compatibility
          # Supports: Ubuntu 18.04+, CentOS 7+, Debian 9+, RHEL 7+
          - python: '3.8'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.9'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.10'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.11'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.12'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.13'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.14'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true

          # Linux ARM64: 7 Python versions (3.8-3.14)
          # Native ARM64 build on ubuntu-24.04-arm runner
          # Supports: AWS Graviton, Raspberry Pi OS, older ARM64 Linux
          - python: '3.8'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.9'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.10'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.11'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.12'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.13'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true
          - python: '3.14'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_17
            docker: true

          # Windows x64: 7 Python versions (3.8-3.14)
          # Native Windows build using MSVC toolchain
          - python: '3.8'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.9'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.10'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.11'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.12'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.13'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.14'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null

          # Windows ARM64: 4 Python versions (3.11-3.14)
          # Python ARM64 on Windows only supports 3.11+
          - python: '3.11'
            runs-on: windows-11-arm
            target: aarch64-pc-windows-msvc
            manylinux: null
          - python: '3.12'
            runs-on: windows-11-arm
            target: aarch64-pc-windows-msvc
            manylinux: null
          - python: '3.13'
            runs-on: windows-11-arm
            target: aarch64-pc-windows-msvc
            manylinux: null
          - python: '3.14'
            runs-on: windows-11-arm
            target: aarch64-pc-windows-msvc
            manylinux: null

          # macOS x64: 7 Python versions (3.8-3.14)
          # Uses macos-15-intel runner (available until Aug 2027)
          # Newer macOS runners only support ARM64 natively
          - python: '3.8'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.9'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.10'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.11'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.12'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.13'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.14'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null

          # macOS ARM64: 7 Python versions (3.8-3.14)
          # Native Apple Silicon build on macos-15 runner
          - python: '3.8'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.9'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.10'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.11'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.12'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.13'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.14'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Configure macOS linker
        if: matrix.target == 'x86_64-apple-darwin' || matrix.target == 'aarch64-apple-darwin'
        run: |
          sudo dscacheutil -flushcache 2>/dev/null || true
          sudo killall -HUP mDNSResponder 2>/dev/null || true

          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999

          mkdir -p .cargo
          cat > .cargo/config.toml << 'CARGO_EOF'
          [target.x86_64-apple-darwin]
          rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

          [target.aarch64-apple-darwin]
          rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

          [net]
          retry = 5

          [http]
          timeout = 60
          CARGO_EOF

      - name: Install protoc for macOS
        if: runner.os == 'macOS'
        run: |
          brew install --quiet protobuf 2>/dev/null || true
          echo "PROTOC=$(brew --prefix protobuf)/bin/protoc" >> $GITHUB_ENV

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/Library/Caches/pip
            ~\AppData\Local\pip\Cache
          key: pip-${{ matrix.python }}-${{ matrix.target }}-${{ hashFiles('**/pyproject.toml', '**/Cargo.toml') }}
          restore-keys: |
            pip-${{ matrix.python }}-${{ matrix.target }}-
            pip-${{ matrix.python }}-

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ matrix.target }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            rust-${{ matrix.target }}-
            rust-

      - name: Install protoc
        if: runner.os == 'Windows' || runner.os == 'Linux'
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install rdkafka dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Configure OpenSSL static linking
        if: runner.os == 'Linux'
        run: |
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
          echo "VENDORED_OPENSSL_SSL=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "cargo:rustflags=-C target-feature=+crt-static" >> $GITHUB_ENV
          if [[ "${{ matrix.target }}" == "aarch64"* ]]; then
            echo "OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu" >> $GITHUB_ENV
          else
            echo "OPENSSL_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          fi
          echo "OPENSSL_INCLUDE_DIR=/usr/include/openssl" >> $GITHUB_ENV

      - name: Configure static linking
        if: runner.os == 'Linux'
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'CARGO_EOF'
          [profile.release]
          lto = true
          codegen-units = 1
          strip = true
          CARGO_EOF

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Install dependencies
        run: pip install maturin auditwheel -i https://pypi.org/simple --quiet

      - name: Build wheel (non-Docker)
        if: matrix.docker != true && matrix.target != 'aarch64-pc-windows-msvc'
        run: |
          maturin build --release --target ${{ matrix.target }} -o dist

      - name: Build wheel (Windows ARM64 - no kafka)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: |
          maturin build --release --target ${{ matrix.target }} -o dist --no-default-features --features pyo3,c,java,grpc,websocket,rabbitmq,cache,queue,gateway,service_mesh,auth,observability,postgres,mysql,sqlite,http_client,system_info,config_hot_reload,protocol

      - name: Build Linux wheel with manylinux
        if: matrix.docker == true
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release -o dist
          before-script-linux: |
            yum install -y perl-core zlib-devel cmake3

      - name: List generated files
        shell: bash
        run: |
          ls -la dist/ 2>/dev/null || echo "No files in dist"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.target }}-${{ matrix.python }}
          path: dist/

  ################################################################################
  # PYPI PUBLISHING JOBS
  ################################################################################
  # These jobs publish the built Python wheels to PyPI (or TestPyPI for testing).
  # They run only when a GitHub Release is published and depend on the build-python
  # job completing successfully.
  #
  # publish-pypi:   Publishes to production PyPI (for production releases)
  # publish-testpypi: Publishes to TestPyPI (for test releases)
  #
  # PUBLICATION REQUIREMENTS:
  # - GitHub secret PYPI_API_TOKEN must be configured
  # - Release title determines target repository:
  #   - Contains "Test": → TestPyPI
  #   - No "Test":        → PyPI (production)
  ################################################################################

  publish-pypi:
    needs: build-python
    if: github.event_name == 'release' && !contains(github.event.release.name, 'Test')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: python-*
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install twine
        run: pip install twine

      - name: Publish to PyPI
        run: |
          twine upload dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  publish-testpypi:
    needs: build-python
    if: github.event_name == 'release' && contains(github.event.release.name, 'Test')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: python-*
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install twine
        run: pip install twine

      - name: Publish to TestPyPI
        run: |
          twine upload --repository-url https://test.pypi.org/legacy/ dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
