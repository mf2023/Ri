################################################################################
# DMSC Rust Library and Python Wheel Build Pipeline
#
# Purpose:
# This GitHub Actions workflow builds the DMSC Rust library and generates
# distributable Python wheel packages (.whl files) for multiple platforms,
# architectures, and Python versions. The workflow ensures binary compatibility
# across the supported target environments.
#
# Architecture Overview:
# 1. Rust Library Compilation Phase: Four dedicated jobs compile the Rust library
#    (libdmsc) as a C dynamic library (cdylib) for each target platform:
#    - Linux x64 (x86_64-unknown-linux-gnu)
#    - Linux arm64 (aarch64-unknown-linux-gnu)
#    - Windows x64 (x86_64-pc-windows-msvc)
#    - macOS x64 (x86_64-apple-darwin)
#
# 2. Python Wheel Generation Phase: A single matrix job generates Python wheels
#    for all supported platform/architecture/Python version combinations.
#    Each matrix entry builds a complete Python wheel with embedded Rust binary.
#
# Build Strategy:
# - Native compilation on matching architecture runners (no cross-compilation)
# - Linux ARM64 uses ubuntu-24.04-arm for proper ARM64 native builds
# - macOS x64 uses macos-15-intel (available until Aug 2027) for Intel builds
# - Docker-based manylinux images for Linux wheel compatibility guarantees
# - maturin as the build tool (Rust/Python integration framework)
#
# Supported Platforms:
# - Linux: x64 and arm64 architectures
# - Windows: x64 architecture
# - macOS: x64 and arm64 (Apple Silicon) architectures
#
# Supported Python Versions: 3.8, 3.9, 3.10, 3.11, 3.12, 3.13, 3.14
#
# Trigger Conditions:
# - Automatic: On push to master branch
# - Manual: Workflow dispatch allows manual execution
#
# Artifacts:
# - Rust library artifacts (.so, .dll, .dylib files) per platform
# - Python wheel artifacts (.whl files) per matrix combination
# - Artifacts are uploaded using actions/upload-artifact@v4
################################################################################

name: Build DMSC

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  # Build Rust library for Linux x64 platform
  # This job compiles the Rust library as a cdylib (C dynamic library) for Linux x64 architecture
  # The compiled artifact is uploaded for use in subsequent Python wheel building jobs
  # Uses native compilation since the ubuntu-latest runner matches the target platform
  build-rust-linux:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository source code
      # Clones the repository to access Cargo.toml and Rust source files
      - uses: actions/checkout@v4
      
      # Step 2: Build Rust library in release mode
      # Compiles libdmsc as a cdylib for x86_64-unknown-linux-gnu target
      # Release mode enables optimizations (-O3) and LTO for maximum performance
      # Output location: target/release/libdmsc.so
      - name: Build
        run: cargo build --release
      
      # Step 3: Upload compiled library artifact
      # Artifact is named rust-linux-x64 for identification in downloads
      # Contains .so files (libdmsc.so) for Python wheel building on Linux x64
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-linux-x64
          path: target/release/libdmsc.*

  # Build Rust library for Linux arm64 platform
  # NOTE: Switching from cross-compilation to native build on ARM64 Ubuntu runner
  # Cross-compilation from x64 to ARM64 fails because:
  # 1. ring crate requires native compilation for cryptographic operations
  # 2. PyO3 linking issues with cross-compiled artifacts
  # Using ubuntu-24.04-arm provides native ARM64 environment for proper compilation
  build-rust-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      # Step 1: Checkout repository source code
      # Clones repository for ARM64 native compilation environment
      - uses: actions/checkout@v4
      
      # Step 2: Build Rust library in release mode
      # Compiles libdmsc as a cdylib for aarch64-unknown-linux-gnu target
      # Native ARM64 compilation ensures correct code generation for the target arch
      # Output location: target/release/libdmsc.so
      - name: Build
        run: cargo build --release
      
      # Step 3: Upload compiled library artifact
      # Artifact is named rust-linux-arm64 for identification
      # Contains .so files for Python wheel building on Linux ARM64 platforms
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-linux-arm64
          path: target/release/libdmsc.*

  # Build Rust library for Windows x64 platform
  # Compiles Rust library as cdylib for Windows x64 (x86_64-pc-windows-msvc target)
  # Uses windows-latest runner for native compilation without cross-compilation overhead
  # The resulting .dll file is suitable for use with Python on Windows x64 systems
  build-rust-windows:
    runs-on: windows-latest
    steps:
      # Step 1: Checkout repository source code
      # Clones repository on Windows runner for native compilation
      - uses: actions/checkout@v4
      
      # Step 2: Build Rust library in release mode
      # Compiles libdmsc as a cdylib for x86_64-pc-windows-msvc target
      # Default MSVC toolchain on Windows provides optimal Windows compatibility
      # Output location: target/release/libdmsc.dll
      - name: Build
        run: cargo build --release
      
      # Step 3: Upload compiled library artifact
      # Artifact is named rust-windows-x64 for identification
      # Contains .dll files for Python wheel building on Windows x64 platforms
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-windows-x64
          path: target/release/libdmsc.*

  # Build Rust library for macOS x64 platform
  # Note: macOS-15-intel is x64 runner (will be available until Aug 2027)
  # Required because newer macOS runners only support ARM64 natively
  # This job runs on Intel-based macOS runners to produce x64 (x86_64-apple-darwin) binaries
  # Native compilation on Intel Mac provides optimal build performance for x64 targets
  # Compiles Rust library as cdylib for macOS x64 architecture
  # The resulting .dylib file is suitable for use with Python on macOS x64 systems
  build-rust-macos:
    runs-on: macos-15-intel
    steps:
      # Step 1: Checkout repository source code
      # Clones repository on macOS x64 (Intel) runner for native compilation
      - uses: actions/checkout@v4
      
      # Step 2: Set up Rust stable toolchain with x86_64-apple-darwin target
      # Installs Rust stable and adds x86_64-apple-darwin target for cross-compilation
      # The target must be installed before building to ensure proper toolchain availability
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-apple-darwin
      
      # Step 3: Set up Python 3.9 for build toolchain compatibility
      # Python 3.9 provides stable maturin support for wheel building
      # Installed using actions/setup-python@v5 for caching and version management
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      # Step 4: Configure linker for macOS dynamic library linking
      # Creates .cargo/config.toml with special linker flags for macOS
      # -undefined dynamic_lookup allows undefined symbols (Python API symbols)
      # Required because Rust/Python bindings need runtime symbol resolution
      - name: Configure linker
        run: |
          mkdir -p .cargo
          echo '[target.x86_64-apple-darwin]' > .cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> .cargo/config.toml
      
      # Step 5: Build Rust library with explicit x86_64-apple-darwin target
      # Explicit --target flag ensures correct architecture compilation
      # Output location: target/release/x86_64-apple-darwin/libdmsc.dylib
      - name: Build Rust library
        run: cargo build --release --target x86_64-apple-darwin
      
      # Step 6: List built artifacts for verification
      # Displays contents of target directory to confirm library was built
      - name: List artifacts
        run: |
          ls -la target/release/x86_64-apple-darwin/ || echo "Build directory not found"
          ls -la target/release/x86_64-apple-darwin/libdmsc* 2>/dev/null || echo "No libdmsc files found"
      
      # Step 7: Upload compiled library artifact
      # Artifact is named rust-macos-x64 for identification
      # Contains .dylib files for Python wheel building on macOS x64 platforms
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-macos-x64
          path: target/release/x86_64-apple-darwin/libdmsc.*

  # Build Python Wheel for all platforms and architectures (supports Python 3.8~3.14)
  # This matrix job generates distributable Python wheel packages (.whl files) for all
  # supported combinations of platforms, architectures, and Python versions (3.8 through 3.14)
  #
  # Matrix Configuration Strategy:
  # - Each matrix entry specifies a unique combination of Python version, runner OS, Rust target,
  #   and manylinux compatibility tag (for Linux wheels)
  # - Linux builds use Docker container with manylinux image for glibc compatibility
  # - macOS and Windows builds use native runners as they use platform-specific formats
  # - fail-fast: false ensures all matrix combinations are attempted even if one fails
  #
  # Platform and Architecture Coverage:
  # - Linux x64 (x86_64-unknown-linux-gnu): manylinux2014 Docker image for glibc 2.17 compatibility
  # - Linux arm64 (aarch64-unknown-linux-gnu): manylinux_2_17 Docker image for glibc 2.17 compatibility
  # - Windows x64 (x86_64-pc-windows-msvc): native windows-latest runner
  # - macOS x64 (x86_64-apple-darwin): macos-15-intel runner
  # - macOS arm64 (aarch64-apple-darwin): macos-15 native ARM64 runner
  #
  # Python Version Support: 3.8, 3.9, 3.10, 3.11, 3.12, 3.13, 3.14
  #
  # Build Process:
  # 1. Checkout repository
  # 2. Set up Docker for Linux builds (manylinux compatibility)
  # 3. Set up Python interpreter matching matrix.python version
  # 4. Install maturin build tool and pip dependencies
  # 5. Build wheel using maturin with appropriate target and compatibility settings
  # 6. Upload built wheel artifact for collection in release
  build-python:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64
          # Python 3.11+ requires glibc 2.25+ (manylinux_2_27)
          # Using manylinux_2_39 for compatibility with modern glibc
          - python: '3.8'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.9'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.10'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.11'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.12'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.13'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.14'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          # Linux arm64
          # Native ARM64 builds on ubuntu-24.04-arm
          # Using manylinux_2_39 for consistency with x64 builds
          - python: '3.8'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.9'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.10'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.11'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.12'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.13'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.14'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          # Windows x64
          # null manylinux indicates platform-specific wheel format (win-amd64)
          # Uses Windows-specific ABI (x86_64-pc-windows-msvc) for optimal performance
          - python: '3.8'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.9'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.10'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.11'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.12'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.13'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.14'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          # Windows arm64
          # Note: GitHub Actions windows-latest does not provide ARM64 Python interpreters
          # Skipping ARM64 builds for Windows as ARM64 Windows runners are not available
          # ARM64 Windows requires specialized Python interpreters not available in GitHub Actions
          # The following entries are commented out to prevent build failures
          # - python: '3.10'
          #   runs-on: windows-latest
          #   target: aarch64-pc-windows-msvc
          #   manylinux: null
          # - python: '3.11'
          #   runs-on: windows-latest
          #   target: aarch64-pc-windows-msvc
          #   manylinux: null
          # - python: '3.12'
          #   runs-on: windows-latest
          #   target: aarch64-pc-windows-msvc
          #   manylinux: null
          # - python: '3.13'
          #   runs-on: windows-latest
          #   target: aarch64-pc-windows-msvc
          #   manylinux: null
          # - python: '3.14'
          #   runs-on: windows-latest
          #   target: aarch64-pc-windows-msvc
          #   manylinux: null
          # macOS x64 (requires macOS-15-intel for native x64 builds)
          # Note: macOS-15-intel is x64 runner (will be available until Aug 2027)
          # macOS wheels use null manylinux as they are platform-specific (.whl format)
          # macOS-15-intel runner required because modern macOS runners only support ARM64
          - python: '3.8'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.9'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.10'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.11'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.12'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.13'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.14'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          # macOS arm64 (native ARM64 build on macOS-15)
          # Requires Python 3.8+ with universal2 support or arm64-specific build
          # Native ARM64 compilation provides optimal performance on Apple Silicon
          # macOS-15 runner provides ARM64-native environment for aarch64-apple-darwin target
          - python: '3.8'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.9'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.10'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.11'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.12'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.13'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.14'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
    steps:
      # Step 1: Checkout repository source code to the workflow runner
      # This action clones the repository contents, making source code and configuration
      # files available for the build process. Uses v4 for latest features and security.
      - uses: actions/checkout@v4
      
      # Step 2: Set up Python interpreter matching matrix.python version
      # Installs the specified Python version using actions/setup-python@v5
      # The Python version is determined by the matrix configuration (3.8-3.14)
      # This enables running Python-based build tools and tests
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      
      # Step 3: Install Rust stable toolchain for compilation
      # Uses dtolnay/rust-toolchain to install Rust stable channel
      # This modern action replaces deprecated actions-rs/toolchain and supports
      # the new Environment Files approach for output handling
      # Required for compiling the Rust library component of the package
      # The toolchain is added to PATH for cargo and rustc access
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      
      # Step 4: Configure macOS linker settings for dynamic library linking
      # Conditional: Only runs when targeting macOS platforms (x64 or ARM64)
      # Creates .cargo/config.toml with linker flags to allow undefined symbols
      # This is required for PyO3 bindings to work correctly on macOS
      # The -undefined dynamic_lookup flag prevents linking errors for Python symbols
      - name: Configure macOS linker
        if: matrix.target == 'x86_64-apple-darwin' || matrix.target == 'aarch64-apple-darwin'
        run: |
          mkdir -p .cargo
          echo '[target.x86_64-apple-darwin]' > .cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> .cargo/config.toml
          echo '' >> .cargo/config.toml
          echo '[target.aarch64-apple-darwin]' >> .cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> .cargo/config.toml
      
      # Step 5: Upgrade pip to latest version for package management
      # Ensures pip has the latest features and security fixes
      # Uses environment variable to completely suppress version check notices
      - name: Update pip
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: 1
        run: python3 -m pip install --upgrade pip -q
      
      # Step 6: Install build dependencies (maturin and auditwheel)
      # maturin: Rust/Python build tool that creates Python wheels from Rust libraries
      # auditwheel: Tool for repairing Linux wheel distribution tags
      # Both are essential for building portable Python packages with native extensions
      - name: Install dependencies
        run: pip install maturin auditwheel --quiet --disable-pip-version-check
      
      # Step 7: Build Python wheel for non-Docker platforms (macOS, Windows, Linux ARM64)
      # Conditional: Executes when docker: false (native builds without manylinux container)
      # Uses maturin to build the wheel with release optimizations
      # Outputs to dist/ directory for artifact collection
      # --target specifies the Rust target triple for cross-compilation if needed
      - name: Build wheel
        if: matrix.docker != true
        run: |
          maturin build --release --target ${{ matrix.target }} -o dist
      
      # Step 8: Build and repair Linux wheel using manylinux Docker container
      # Conditional: Executes when docker: true (Linux x64 builds)
      # First builds the wheel in wheelhouse/ directory
      # Then uses auditwheel to repair and tag the wheel for manylinux compatibility
      # The --plat flag sets the platform tag (e.g., manylinux_2_39_x86_64)
      # This ensures the wheel can be installed on older Linux distributions
      - name: Build Linux wheel with auditwheel repair
        if: matrix.docker == true
        run: |
          TARGET="${{ matrix.target }}"
          ARCH="${TARGET%%-*}"
          maturin build --release --target "$TARGET" -o wheelhouse
          auditwheel repair wheelhouse/*.whl -w dist --plat ${{ matrix.manylinux }}_${ARCH}
      
      # Step 9: List generated wheel files for debugging and verification
      # Shell: bash required for glob patterns and ls command
      # Displays all files in dist/ directory or shows message if empty
      # Helps verify wheel generation was successful
      - name: List generated files
        shell: bash
        run: |
          ls -la dist/ 2>/dev/null || echo "No files in dist"
      
      # Step 10: Upload built wheel artifact for collection and release
      # Uses actions/upload-artifact@v4 to upload wheel files
      # Artifact name includes target platform and Python version for identification
      # Artifacts are available for 90 days by default in GitHub Actions
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.target }}-${{ matrix.python }}
          path: dist/
