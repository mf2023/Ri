  ################################################################################
  # Job: Build Python Wheels for All Platforms
  ################################################################################
  # This matrix job generates distributable Python wheel packages (.whl files) for all
  # supported combinations of platforms, architectures, and Python versions (3.8 through 3.14)
  #
  # Matrix Configuration Strategy:
  # - Each matrix entry specifies a unique combination of Python version, runner OS, Rust target,
  #   and manylinux compatibility tag (for Linux wheels)
  # - Linux builds use Docker container with manylinux image for glibc compatibility
  # - macOS and Windows builds use native runners as they use platform-specific formats
  # - fail-fast: false ensures all matrix combinations are attempted even if one fails
  #
  # Platform and Architecture Coverage:
  # - Linux x64 (x86_64-unknown-linux-gnu): manylinux2014 Docker image for glibc 2.17 compatibility
  # - Linux arm64 (aarch64-unknown-linux-gnu): manylinux_2_17 Docker image for glibc 2.17 compatibility
  # - Windows x64 (x86_64-pc-windows-msvc): native windows-latest runner
  # - macOS x64 (x86_64-apple-darwin): macos-15-intel runner
  # - macOS arm64 (aarch64-apple-darwin): macos-15 native ARM64 runner
  #
  # Python Version Support: 3.8, 3.9, 3.10, 3.11, 3.12, 3.13, 3.14
  #
  # Build Process:
  # 1. Checkout repository
  # 2. Set up Docker for Linux builds (manylinux compatibility)
  # 3. Set up Python interpreter matching matrix.python version
  # 4. Install maturin build tool and pip dependencies
  # 5. Build wheel using maturin with appropriate target and compatibility settings
  # 6. Upload built wheel artifact for collection in release
  build-python:
    # Use the runner specified in the matrix configuration
    runs-on: ${{ matrix.runs-on }}
    
    # Environment variables for the job
    env:
      # Disable pip version check to avoid unnecessary warnings
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
      # Increase Cargo HTTP timeout for slower networks
      CARGO_HTTP_TIMEOUT: '60'
      # Use git CLI for fetching to improve compatibility
      CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
    
    # Matrix strategy configuration
    strategy:
      # Continue building other matrix combinations even if one fails
      # This ensures maximum coverage even with partial failures
      fail-fast: false
      
      # Matrix defines all platform/architecture/Python combinations to build
      matrix:
        include:
          ##########################################################################
          # Linux x64 Matrix Entries
          ##########################################################################
          # Python 3.11+ requires glibc 2.25+ (manylinux_2_27)
          # Using manylinux_2_39 for compatibility with modern glibc
          
          - python: '3.8'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.9'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.10'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.11'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.12'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.13'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          - python: '3.14'
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: true
          
          ##########################################################################
          # Linux ARM64 Matrix Entries
          ##########################################################################
          # Native ARM64 builds on ubuntu-24.04-arm
          # Using manylinux_2_39 for consistency with x64 builds
          
          - python: '3.8'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.9'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.10'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.11'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.12'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.13'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          - python: '3.14'
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_39
            docker: false
          
          ##########################################################################
          # Windows x64 Matrix Entries
          ##########################################################################
          # null manylinux indicates platform-specific wheel format (win-amd64)
          # Uses Windows-specific ABI (x86_64-pc-windows-msvc) for optimal performance
          
          - python: '3.8'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.9'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.10'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.11'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.12'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.13'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          - python: '3.14'
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: null
          
          ##########################################################################
          # Windows ARM64 Matrix Entries
          ##########################################################################
          # Native Windows ARM64 builds on windows-11-arm runner
          # Python ARM64 interpreters on Windows only support 3.11+
          
          - python: '3.11'
            runs-on: windows-11-arm
            target: aarch64-pc-windows-msvc
            manylinux: null
          - python: '3.12'
            runs-on: windows-11-arm
            target: aarch64-pc-windows-msvc
            manylinux: null
          - python: '3.13'
            runs-on: windows-11-arm
            target: aarch64-pc-windows-msvc
            manylinux: null
          - python: '3.14'
            runs-on: windows-11-arm
            target: aarch64-pc-windows-msvc
            manylinux: null
          
          ##########################################################################
          # macOS x64 Matrix Entries
          ##########################################################################
          # Note: macOS-15-intel is x64 runner (will be available until Aug 2027)
          # macOS wheels use null manylinux as they are platform-specific (.whl format)
          # macOS-15-intel runner required because modern macOS runners only support ARM64
          
          - python: '3.8'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.9'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.10'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.11'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.12'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.13'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          - python: '3.14'
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: null
          
          ##########################################################################
          # macOS ARM64 Matrix Entries
          ##########################################################################
          # Requires Python 3.8+ with universal2 support or arm64-specific build
          # Native ARM64 compilation provides optimal performance on Apple Silicon
          # macOS-15 runner provides ARM64-native environment for aarch64-apple-darwin target
          
          - python: '3.8'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.9'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.10'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.11'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.12'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.13'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
          - python: '3.14'
            runs-on: macos-15
            target: aarch64-apple-darwin
            manylinux: null
    
    # Build steps executed for each matrix combination
    steps:
      # Step 1: Checkout repository source code to the workflow runner
      # This action clones the repository contents, making source code and configuration
      # files available for the build process. Uses v4 for latest features and security.
      - uses: actions/checkout@v4
      
      # Step 2: Set up Python interpreter matching matrix.python version
      # Installs the specified Python version using actions/setup-python@v5
      # The Python version is determined by the matrix configuration (3.8-3.14)
      # This enables running Python-based build tools and tests
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      
      # Step 3: Install Rust stable toolchain for compilation
      # Uses dtolnay/rust-toolchain to install Rust stable channel
      # This modern action replaces deprecated actions-rs/toolchain and supports
      # the new Environment Files approach for output handling
      # Required for compiling the Rust library component of the package
      # The toolchain is added to PATH for cargo and rustc access
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      
      # Step 4: Configure macOS linker settings for dynamic library linking
      # Conditional: Only runs when targeting macOS platforms (x64 or ARM64)
      # Creates .cargo/config.toml with linker flags to allow undefined symbols
      # This is required for PyO3 bindings to work correctly on macOS
      # The -undefined dynamic_lookup flag prevents linking errors for Python symbols
      # Also fixes DNS issues on macos-15-intel runner by flushing DNS cache
      - name: Configure macOS linker
        if: matrix.target == 'x86_64-apple-darwin' || matrix.target == 'aarch64-apple-darwin'
        run: |
          # Fix DNS resolution issues on macOS Intel runners
          sudo dscacheutil -flushcache 2>/dev/null || true
          sudo killall -HUP mDNSResponder 2>/dev/null || true
          
          # Configure git for better network handling
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999
          
          mkdir -p .cargo
          echo '[target.x86_64-apple-darwin]' > .cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> .cargo/config.toml
          echo '' >> .cargo/config.toml
          echo '[target.aarch64-apple-darwin]' >> .cargo/config.toml
          echo 'rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]' >> .cargo/config.toml
          echo '' >> .cargo/config.toml
          echo '[net]' >> .cargo/config.toml
          echo 'retry = 5' >> .cargo/config.toml
          echo '[http]' >> .cargo/config.toml
          echo 'timeout = 60' >> .cargo/config.toml

      # Step 4b: Install protoc for macOS (required by etcd-client)
      - name: Install protoc for macOS
        if: runner.os == 'macOS'
        run: |
          brew install protobuf
          echo "PROTOC=$(brew --prefix protobuf)/bin/protoc" >> $GITHUB_ENV

      # Step 5: Cache pip dependencies to avoid rate limits
      # Using GitHub Actions cache to store pip packages
      # This significantly speeds up builds and avoids PyPI rate limits
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/Library/Caches/pip
            ~\AppData\Local\pip\Cache
          key: pip-${{ matrix.python }}-${{ matrix.target }}-${{ hashFiles('**/pyproject.toml', '**/Cargo.toml') }}
          restore-keys: |
            pip-${{ matrix.python }}-${{ matrix.target }}-
            pip-${{ matrix.python }}-
      
      # Step 6: Cache Rust cargo registry to speed up builds
      # Caching cargo registry and target directory significantly reduces build times
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ matrix.target }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            rust-${{ matrix.target }}-
            rust-

      # Step 7: Install protoc for Windows and Linux builds (required by etcd-client)
      # Conditional: Only runs on Windows and Linux platforms (not macOS)
      # protoc is needed to compile .proto files for the etcd-client dependency
      - name: Install protoc
        if: runner.os == 'Windows' || runner.os == 'Linux'
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Step 8: Install system dependencies for rdkafka on Linux
      # Conditional: Only runs on Linux platforms
      # Installs curl and SASL libraries required by the Kafka C client
      - name: Install rdkafka dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      # Step 9: Configure OpenSSL for static linking on Linux builds
      # This ensures all OpenSSL dependencies are statically linked into the binary
      # to avoid "libcrypto-*.so.3 not found" errors during auditwheel repair
      # OPENSSL_STATIC=1: Links OpenSSL statically
      # VENDORED_OPENSSL_SSL: Forces openssl crate to use vendored OpenSSL
      # OPENSSL_LIB_DIR and OPENSSL_INCLUDE_DIR: Must match target architecture
      # - x86_64: /usr/lib/x86_64-linux-gnu, /usr/include/openssl
      # - aarch64: /usr/lib/aarch64-linux-gnu, /usr/include/openssl
      - name: Configure OpenSSL static linking
        if: runner.os == 'Linux'
        run: |
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
          echo "VENDORED_OPENSSL_SSL=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "cargo:rustflags=-C target-feature=+crt-static" >> $GITHUB_ENV
          if [[ "${{ matrix.target }}" == "aarch64"* ]]; then
            echo "OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu" >> $GITHUB_ENV
          else
            echo "OPENSSL_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          fi
          echo "OPENSSL_INCLUDE_DIR=/usr/include/openssl" >> $GITHUB_ENV
      
      # Step 10: Configure Rust linker for static linking on Linux builds
      # This ensures the final binary is fully statically linked
      # Configures build profile settings for optimal release builds
      - name: Configure static linking
        if: runner.os == 'Linux'
        run: |
          mkdir -p .cargo
          printf '[profile.release]\n' > .cargo/config.toml
          printf 'lto = true\ncodegen-units = 1\nstrip = true\n' >> .cargo/config.toml
      
      # Step 11: Upgrade pip and install build dependencies
      # Upgrading pip before installation helps avoid API rate limits
      # and ensures using the latest versions of build tools
      # Using pip cache to avoid repeated downloads from PyPI
      # Configures Tsinghua University PyPI mirror for faster downloads in China
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple

      # Step 12: Install build dependencies (maturin and auditwheel)
      # maturin: Rust/Python build tool that creates Python wheels from Rust libraries
      # auditwheel: Tool for repairing Linux wheel distribution tags
      # Both are essential for building portable Python packages with native extensions
      # Using official PyPI for maturin to ensure latest version is available
      - name: Install dependencies
        run: pip install maturin auditwheel -i https://pypi.org/simple --quiet
      
      # Step 13: Build Python wheel for non-Docker platforms (macOS, Windows, Linux ARM64)
      # Conditional: Executes when docker: false (native builds without manylinux container)
      # Uses maturin to build the wheel with release optimizations
      # Outputs to dist/ directory for artifact collection
      # --target specifies the Rust target triple for cross-compilation if needed
      - name: Build wheel (non-Docker)
        if: matrix.docker != true
        run: |
          maturin build --release --target ${{ matrix.target }} -o dist
      
      # Step 14: Build and repair Linux wheel using manylinux Docker container
      # Conditional: Executes when docker: true (Linux x64 builds)
      # First builds the wheel in wheelhouse/ directory
      # Then uses auditwheel to repair and tag the wheel for manylinux compatibility
      # The --plat flag sets the platform tag (e.g., manylinux_2_39_x86_64)
      # This ensures the wheel can be installed on older Linux distributions
      # Note: OpenSSL is now statically linked, so auditwheel won't have issues
      - name: Build Linux wheel with auditwheel repair
        if: matrix.docker == true
        run: |
          TARGET="${{ matrix.target }}"
          ARCH="${TARGET%%-*}"
          maturin build --release --target "$TARGET" -o wheelhouse
          auditwheel repair wheelhouse/*.whl -w dist --plat ${{ matrix.manylinux }}_${ARCH}
      
      # Step 15: List generated wheel files for debugging and verification
      # Shell: bash required for glob patterns and ls command
      # Displays all files in dist/ directory or shows message if empty
      # Helps verify wheel generation was successful
      - name: List generated files
        shell: bash
        run: |
          ls -la dist/ 2>/dev/null || echo "No files in dist"
      
      # Step 16: Upload built wheel artifact for collection and release
      # Uses actions/upload-artifact@v4 to upload wheel files
      # Artifact name includes target platform and Python version for identification
      # Artifacts are available for 90 days by default in GitHub Actions
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.target }}-${{ matrix.python }}
          path: dist/

  ################################################################################
  # Job: Publish to PyPI (Production Releases)
  ################################################################################
  # Publishes Python wheels to PyPI (Python Package Index) when a GitHub Release is published
  # Only runs when GitHub Release title does NOT contain "Test"
  # This makes the package available via pip install
  ################################################################################
  publish-pypi:
    # Depends on build-python job completing successfully
    needs: build-python
    
    # Conditional: Only run for production releases (not test releases)
    # Checks if this is a release event and the release name doesn't contain "Test"
    if: github.event_name == 'release' && !contains(github.event.release.name, 'Test')
    
    # Use Ubuntu latest for publishing
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Download all wheel artifacts from build-python job
      # Uses pattern matching to download all python-* artifacts
      # merge-multiple combines all artifacts into a single directory
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: python-*
          merge-multiple: true

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install twine for uploading to PyPI
      - name: Install twine
        run: pip install twine

      # Step 4: Upload wheels to PyPI using twine
      # Uses PYPI_API_TOKEN secret for authentication
      # TWINE_USERNAME is set to __token__ for API token authentication
      - name: Publish to PyPI
        run: |
          twine upload dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  ################################################################################
  # Job: Publish to TestPyPI (Test Releases)
  ################################################################################
  # Publishes Python wheels to TestPyPI (testing instance of PyPI) when a GitHub Release is published
  # Only runs when GitHub Release title contains "Test"
  # Used for testing the release process before production release
  ################################################################################
  publish-testpypi:
    # Depends on build-python job completing successfully
    needs: build-python
    
    # Conditional: Only run for test releases
    # Checks if this is a release event and the release name contains "Test"
    if: github.event_name == 'release' && contains(github.event.release.name, 'Test')
    
    # Use Ubuntu latest for publishing
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Download all wheel artifacts from build-python job
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: python-*
          merge-multiple: true

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install twine for uploading to TestPyPI
      - name: Install twine
        run: pip install twine

      # Step 4: Upload wheels to TestPyPI using twine
      # Uses PYPI_TEST_API_TOKEN secret for authentication
      # Repository URL points to TestPyPI instead of production PyPI
      - name: Publish to TestPyPI
        run: |
          twine upload --repository-url https://test.pypi.org/legacy/ dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TEST_API_TOKEN }}

  ################################################################################
  # Job: Publish to crates.io (Production Releases)
  ################################################################################
  # Publishes the Rust crate to crates.io registry when a GitHub Release is published
  # Only runs when GitHub Release title does NOT contain "Test"
  # This makes the library available to other Rust projects via cargo
  ################################################################################
  publish-crate:
    # Depends on all Rust build jobs completing successfully
    # Ensures the crate compiles on all supported platforms before publishing
    needs: [build-rust-linux, build-rust-linux-arm64, build-rust-windows, build-rust-macos]
    
    # Conditional: Only run for production releases (not test releases)
    # Checks if this is a release event and the release name doesn't contain "Test"
    if: github.event_name == 'release' && !contains(github.event.release.name, 'Test')
    
    # Use Ubuntu latest for publishing
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout repository source code
      - uses: actions/checkout@v4

      # Step 2: Install Rust toolchain
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Step 3: Install protoc for etcd-client build
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: Install CMake for rdkafka build
      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      # Step 5: Install system dependencies for rdkafka
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      # Step 6: Publish to crates.io using cargo publish
      # Uses the CARGO_REGISTRY_TOKEN secret for authentication
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  ################################################################################
  # Job: Sync Release to Gitee
  ################################################################################
  # Creates the same release on Gitee with title, description, and tag
  # Runs for both test and production releases
  # This ensures the Chinese mirror (Gitee) has the same release information
  ################################################################################
  sync-to-gitee:
    # Depends on all build jobs completing successfully
    needs: [build-rust-linux, build-rust-linux-arm64, build-rust-windows, build-rust-macos, build-python]
    
    # Conditional: Run for any release (both test and production)
    if: github.event_name == 'release'
    
    # Use Ubuntu latest for API calls
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Sync release information to Gitee using API
      # Uses GITEE_TOKEN secret for authentication
      # Creates a release with the same tag, name, and body as GitHub
      # Note: Using jq to properly escape JSON special characters in release body
      - name: Sync Release to Gitee
        run: |
          # Gitee API endpoint for creating releases
          GITEE_API="https://gitee.com/api/v5/repos/dunimd/dmsc/releases"
          
          # Create JSON payload using jq to properly escape special characters
          jq -n \
            --arg token "${{ secrets.GITEE_TOKEN }}" \
            --arg tag "${{ github.event.release.tag_name }}" \
            --arg name "${{ github.event.release.name }}" \
            --arg body "${{ github.event.release.body }}" \
            '{
              access_token: $token,
              tag_name: $tag,
              name: $name,
              body: $body,
              prerelease: false,
              target_commitish: "master"
            }' > payload.json
          
          # Create release on Gitee using curl POST request
          curl -X POST "$GITEE_API" \
            -H "Content-Type: application/json" \
            -d @payload.json
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}

  ################################################################################
  # Job: Run Python Tests
  ################################################################################
  # This job builds the Python package and runs pytest to verify the bindings work correctly
  # Runs separately from compilation to isolate test failures from build failures
  run-python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Configure OpenSSL static linking
        run: |
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
          echo "VENDORED_OPENSSL_SSL=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Install test dependencies
        run: pip install pytest maturin -i https://pypi.org/simple

      - name: Build and install package
        run: |
          pip install -e . --no-build-isolation

      - name: Run Python tests
        run: pytest tests/Python/ -v

  ################################################################################
  # Job: Run Rust Tests
  ################################################################################
  # This job runs cargo test to verify the Rust library works correctly
  run-rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Run Rust tests
        run: cargo test --no-default-features --features "pyo3,auth,cache,queue,gateway,observability,rabbitmq,protocol,sqlite,postgres,mysql,service_mesh,parking_lot,http_client,system_info,config_hot_reload,grpc,websocket,kafka,etcd"

  ################################################################################
  # Job: Run Performance Benchmarks
  ################################################################################
  # This job runs cargo bench to measure performance metrics for all modules
  # Runs on every workflow trigger to track performance regressions
  # Benchmark results are uploaded as artifacts for analysis
  run-benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: bench-rust-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            bench-rust-
            rust-

      - name: Run cache benchmarks
        run: cargo bench --bench cache --no-default-features --features "pyo3,c,cache,queue,gateway,auth,protocol,grpc,websocket" -- --save-baseline cache-baseline

      - name: Run queue benchmarks
        run: cargo bench --bench queue --no-default-features --features "pyo3,c,cache,queue,gateway,auth,protocol,grpc,websocket" -- --save-baseline queue-baseline

      - name: Run gateway benchmarks
        run: cargo bench --bench gateway --no-default-features --features "pyo3,c,cache,queue,gateway,auth,protocol,grpc,websocket" -- --save-baseline gateway-baseline

      - name: Run auth benchmarks
        run: cargo bench --bench auth --no-default-features --features "pyo3,c,cache,queue,gateway,auth,protocol,grpc,websocket" -- --save-baseline auth-baseline

      - name: Run protocol benchmarks
        run: cargo bench --bench protocol --no-default-features --features "pyo3,c,cache,queue,gateway,auth,protocol,grpc,websocket" -- --save-baseline protocol-baseline

      - name: Run core benchmarks
        run: cargo bench --bench core --no-default-features --features "pyo3,c,cache,queue,gateway,auth,protocol,grpc,websocket" -- --save-baseline core-baseline

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 30

  ################################################################################
  # Job: Build Java JNI Libraries for All Platforms
  ################################################################################
  # This job compiles the DMSC library as a JNI dynamic library for Java usage
  # Generates platform-specific JNI libraries (.dll, .so, .dylib)
  ################################################################################
  build-java-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Build JNI library
        run: cargo build --release --no-default-features --features java

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-linux-x64
          path: target/release/libdmsc.so

  build-java-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Build JNI library
        run: cargo build --release --no-default-features --features java

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-linux-arm64
          path: target/release/libdmsc.so

  build-java-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Build JNI library
        run: cargo build --release --no-default-features --features java

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-windows-x64
          path: target/release/dmsc.dll

  build-java-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-pc-windows-msvc

      - name: Build JNI library
        run: cargo build --release --target aarch64-pc-windows-msvc --no-default-features --features java

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-windows-arm64
          path: target/aarch64-pc-windows-msvc/release/dmsc.dll

  build-java-macos:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          brew update
          brew install cmake pkg-config || true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: x86_64-apple-darwin

      - name: Build JNI library
        run: cargo build --release --target x86_64-apple-darwin --no-default-features --features java

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-macos-x64
          path: target/x86_64-apple-darwin/release/libdmsc.dylib

  build-java-macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '33.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          brew update
          brew install cmake pkg-config || true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Build JNI library
        run: cargo build --release --target aarch64-apple-darwin --no-default-features --features java

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-macos-arm64
          path: target/aarch64-apple-darwin/release/libdmsc.dylib

  ################################################################################
  # Job: Publish Java Library to Maven Central
  ################################################################################
  # This job builds the Java JAR with embedded native libraries and publishes to Maven Central
  # Only runs for production releases (not test releases)
  ################################################################################
  publish-maven:
    needs: [build-java-linux, build-java-linux-arm64, build-java-windows, build-java-windows-arm64, build-java-macos, build-java-macos-arm64]
    
    if: github.event_name == 'release' && !contains(github.event.release.name, 'Test')
    
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Download Linux x64 JNI library
        uses: actions/download-artifact@v4
        with:
          name: java-linux-x64
          path: java/src/main/resources/native/linux/x64

      - name: Download Linux ARM64 JNI library
        uses: actions/download-artifact@v4
        with:
          name: java-linux-arm64
          path: java/src/main/resources/native/linux/arm64

      - name: Download Windows x64 JNI library
        uses: actions/download-artifact@v4
        with:
          name: java-windows-x64
          path: java/src/main/resources/native/windows/x64

      - name: Download Windows ARM64 JNI library
        uses: actions/download-artifact@v4
        with:
          name: java-windows-arm64
          path: java/src/main/resources/native/windows/arm64

      - name: Download macOS x64 JNI library
        uses: actions/download-artifact@v4
        with:
          name: java-macos-x64
          path: java/src/main/resources/native/macos/x64

      - name: Download macOS ARM64 JNI library
        uses: actions/download-artifact@v4
        with:
          name: java-macos-arm64
          path: java/src/main/resources/native/macos/arm64

      - name: Build and deploy to Maven Central
        run: |
          cd java
          mkdir -p ~/.m2
          echo '<settings><servers><server><id>central</id><username>${CENTRAL_USERNAME}</username><password>${CENTRAL_PASSWORD}</password></server></servers></settings>' > ~/.m2/settings.xml
          mvn clean deploy -P release -DskipTests
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
