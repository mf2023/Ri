name: Build DMSC

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmsc-linux-x64
          path: target/release/libdmsc.*

  build-linux-arm64:
    runs-on: ubuntu-latest-4-cores
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmsc-linux-arm64
          path: target/aarch64-unknown-linux-gnu/release/libdmsc.*

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmsc-windows-x64
          path: target/release/libdmsc.*

  build-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmsc-macos-x64
          path: target/release/libdmsc.*

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmsc-macos-arm64
          path: target/aarch64-apple-darwin/release/libdmsc.*
